function renderWorkoutItem(workout, weekNum) {
  const logEntry = state.log.find(l => l.workoutId === workout.id);
  const cs = logEntry?.completionStatus ?? (logEntry?.completed ? 'complete' : null);
  const done = cs === 'complete';

  // Card state class and check-circle class
  const itemClass   = cs === 'complete' ? 'completed' : cs === 'partial' ? 'partial-log' : cs === 'missed' ? 'missed-log' : '';
  const checkClass  = cs === 'complete' ? 'done' : cs === 'partial' ? 'partial' : cs === 'missed' ? 'missed' : '';

  const score = logEntry?.completionScore ?? null;
  const statusBadge = cs
    ? ` &bull; <span style="font-weight:700;color:${cs==='complete'?'var(--mint)':cs==='partial'?'#F59E0B':'var(--rose)'}">${cs}</span>`
    : '';

  const STATUS_LIST = ['done','partial','skipped','substituted','extra'];
  const STATUS_LABELS = { done:'Done', partial:'Partial', skipped:'Skipped', substituted:'Subbed', extra:'Extra' };

  const exerciseRows = workout.exercises.map((ex, i) => {
    const exLog = logEntry?.exerciseLogs?.[i] ?? null;
    const defaultStatus = (logEntry && !logEntry.exerciseLogs) ? (logEntry.completed ? 'done' : '') : '';
    const status = exLog?.status ?? defaultStatus;
    const pillsHtml = STATUS_LIST.map(s =>
      `<button class="ex-status-pill${status===s?' sel':''}" data-pill="${workout.id}-${i}-${s}" onclick="setExStatus('${workout.id}',${i},'${s}')">${STATUS_LABELS[s]}</button>`
    ).join('');
    const subVisible = status === 'substituted' ? 'block' : 'none';
    return `
      <div class="ex-log-row" id="exrow-${workout.id}-${i}" data-status="${status}">
        <input type="hidden" id="exst-${workout.id}-${i}" value="${status}">
        <div class="ex-log-head">
          <div class="ex-log-name">${ex.name}</div>
          <div class="ex-log-plan">${ex.sets} &times; ${ex.reps}${ex.rest ? ' &middot; ' + ex.rest + 's' : ''}</div>
          <div class="ex-log-pills">${pillsHtml}</div>
        </div>
        <div class="ex-log-fields">
          <div class="ex-log-field"><label>Sets</label><input type="text" id="exsets-${workout.id}-${i}" placeholder="${ex.sets}" value="${exLog?.actualSets ?? ''}"></div>
          <div class="ex-log-field"><label>Reps</label><input type="text" id="exreps-${workout.id}-${i}" placeholder="${ex.reps}" value="${exLog?.actualReps ?? ''}"></div>
          <div class="ex-log-field"><label>Weight</label><input type="text" id="exwt-${workout.id}-${i}" placeholder="—" value="${exLog?.actualWeight ?? ''}"></div>
          <div class="ex-log-field"><label>Notes</label><input type="text" id="exnotes-${workout.id}-${i}" placeholder="optional" value="${exLog?.notes ?? ''}"></div>
        </div>
        <div class="ex-sub-wrap" id="exsub-wrap-${workout.id}-${i}" style="display:${subVisible}">
          <label>Substitute Exercise</label>
          <input type="text" id="exsub-${workout.id}-${i}" placeholder="What did you do instead?" value="${exLog?.substituteName ?? ''}">
        </div>
      </div>`;
  }).join('');

  const scoreHtml = score !== null ? `
    <div class="ex-score-row">
      <span class="ex-score-label">Completion Score</span>
      <span class="ex-score-val" style="color:${score>=85?'var(--mint)':score>=40?'#F59E0B':'var(--rose)'}">${score}%</span>
    </div>` : '';

  return `
    <div class="workout-item ${itemClass}" id="wi-${workout.id}">
      <div class="workout-header" onclick="toggleWorkoutDetail('${workout.id}')">
        <div class="workout-check ${checkClass}" onclick="event.stopPropagation();toggleWorkoutComplete('${workout.id}',${weekNum})"></div>
        <div class="workout-info">
          <div class="workout-day">${workout.day}</div>
          <div class="workout-name">${workout.name}</div>
          <div class="workout-meta">${workout.exercises.length} exercises &bull; ~${Math.round(workout.duration)} min &bull; RPE ${workout.rpe}${statusBadge}</div>
        </div>
        <button class="workout-expand-btn" onclick="event.stopPropagation();toggleWorkoutDetail('${workout.id}')">${cs ? 'View Log' : 'Log'}</button>
      </div>
      <div class="workout-details" id="wd-${workout.id}">
        <div class="ex-log-table">${exerciseRows}</div>
        ${scoreHtml}
        <div class="log-form">
          <div class="form-row">
            <div class="form-group">
              <label>Total Duration (min)</label>
              <input type="number" id="log-dur-${workout.id}" placeholder="35" value="${logEntry?.duration ?? ''}">
            </div>
            <div class="form-group">
              <label>Overall RPE (1–10)</label>

}

function calcWeekCompletion(weekData, weekNum) {
  const ids = weekData.workouts.map(w => w.id);
  const done = state.log.filter(l => ids.includes(l.workoutId) && l.completed).length;
  return ids.length > 0 ? Math.round(done / ids.length * 100) : 0;
}

function calcStreak() {
  const logDates = [...new Set(state.log.filter(l => l.completed).map(l => l.date))].sort().reverse();
  if (!logDates.length) return 0;
  let streak = 0;
  let checkDate = new Date(); checkDate.setHours(0,0,0,0);
  // Allow today or yesterday as starting point
  const todayStr = today();
  const yesterdayStr = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (!logDates.includes(todayStr) && !logDates.includes(yesterdayStr)) return 0;
  let current = logDates.includes(todayStr) ? new Date(todayStr + 'T00:00:00') : new Date(yesterdayStr + 'T00:00:00');
  for (const d of logDates) {
    const dDate = new Date(d + 'T00:00:00');
    const diff = Math.round((current - dDate) / 86400000);
    if (diff === 0) { streak++; current = new Date(dDate.getTime() - 86400000); }
    else break;
  }
  return streak;
}

// ==================== DAY STREAK (METRICS-BASED) ====================

function normalizeDateOnly(dateValue) {
  if (!dateValue) return null;
  const s = typeof dateValue === 'string' ? dateValue : String(dateValue);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[1]}-${m[2]}-${m[3]}` : null;
}

function addDaysToDateString(dateStr, delta) {
  const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return dateStr;
  const d = new Date(Date.UTC(+m[1], +m[2] - 1, +m[3]));
  d.setUTCDate(d.getUTCDate() + delta);
  return d.toISOString().slice(0, 10);
}

function getUniqueMetricDates(metrics) {
  const seen = new Set();
  (metrics || []).forEach(m => {
    const d = normalizeDateOnly(m.date);
    if (d) seen.add(d);
  });
  return [...seen].sort();
}

function calculateDayStreak(metrics) {
  const dates = getUniqueMetricDates(metrics);
  if (!dates.length) return 0;
  const dateSet = new Set(dates);
  let cursor = dates[dates.length - 1];
  let streak = 0;
  while (dateSet.has(cursor)) {
    streak++;
    cursor = addDaysToDateString(cursor, -1);
  }
  return streak;
}

function toggleWorkoutComplete(workoutId, weekNum) {

  } else {

function saveWorkoutLog(workoutId, weekNum) {
  const dur   = document.getElementById('log-dur-'   + workoutId)?.value;
  const rpe   = document.getElementById('log-rpe-'   + workoutId)?.value;
  const notes = document.getElementById('log-notes-' + workoutId)?.value;
  const date  = document.getElementById('log-date-'  + workoutId)?.value || today();

  // Collect exercise-level data
  let workout = null;
  for (const w of (state.plan?.weeks || [])) {
    workout = w.workouts.find(wo => wo.id === workoutId);
    if (workout) break;
  }
  const POINT_MAP = { done: 1, extra: 1, substituted: 0.8, partial: 0.5, skipped: 0 };
  const exerciseLogs = (workout?.exercises || []).map((ex, i) => {
    const status = document.getElementById(`exst-${workoutId}-${i}`)?.value || '';
    return {
      plannedName: ex.name, plannedSets: ex.sets, plannedReps: ex.reps, plannedRest: ex.rest || 0,
      status,
      actualSets:       document.getElementById(`exsets-${workoutId}-${i}`)?.value  || '',
      actualReps:       document.getElementById(`exreps-${workoutId}-${i}`)?.value  || '',
      actualWeight:     document.getElementById(`exwt-${workoutId}-${i}`)?.value    || '',
      actualWeightUnit: state.settings.weightUnit || 'lbs',
      substituteName:   document.getElementById(`exsub-${workoutId}-${i}`)?.value   || '',
      notes:            document.getElementById(`exnotes-${workoutId}-${i}`)?.value || ''
    };
  });

  const totalPossible  = exerciseLogs.length;
  const earned         = exerciseLogs.reduce((s, el) => s + (POINT_MAP[el.status] ?? 0), 0);
  const completionScore  = totalPossible > 0 ? Math.round(earned / totalPossible * 100) : (dur ? 100 : 0);
  const completionStatus = completionScore >= 85 ? 'complete' : completionScore >= 40 ? 'partial' : 'missed';

  let entry = state.log.find(l => l.workoutId === workoutId);
  if (entry) {
    entry.duration = dur ? +dur : null;
    entry.rpe = rpe ? +rpe : null;
    entry.notes = notes || '';
    entry.date = date;
    entry.completed = completionStatus === 'complete';
    entry.completionStatus = completionStatus;
    entry.completionScore  = completionScore;
    entry.exerciseLogs     = exerciseLogs;
  } else {
    state.log.push({
      workoutId, date,
      completed: completionStatus === 'complete',
      completionStatus, completionScore,
      duration: dur ? +dur : null,
      rpe: rpe ? +rpe : null,
      notes: notes || '',
      exerciseLogs
    });
  }
  saveLog();
  renderDashboard();
  renderInsights();
  renderPlan();
  showToast('Workout saved! ' + completionScore + '% completion');
}

// ---- Muscle Group Classification ----

function classifyMuscleGroup(name) {
  if (!name) return 'Full Body';
  const n = name.toLowerCase();
  if (/press|row|curl|tricep|pulldown|shoulder|chest|bicep|pull.?up|lat|delt|fly|dip|push.?up|rear|rhomboid|trap|upright|overhead/.test(n)) return 'Upper Body';
  if (/squat|lunge|deadlift|leg press|calf|hip|glute|hamstring|quad|rdl|step.?up|sumo|hip thrust|leg curl|leg extension|hip hinge/.test(n)) return 'Lower Body';
  if (/plank|crunch|ab |abs|dead bug|russian twist|leg raise|core|pallof|hollow|bird.?dog|sit.?up|cable crunch|oblique/.test(n)) return 'Core';
  if (/treadmill|elliptical|running|bike|burpee|cardio|hiit|jump|row machine|sprint|walk|stair|sled|skip/.test(n)) return 'Cardio';
  return 'Full Body';
}

function getMuscleGroupData() {
  const counts = { 'Upper Body': 0, 'Lower Body': 0, 'Core': 0, 'Cardio': 0, 'Full Body': 0 };
  const hasLogs = state.log && state.log.length > 0;

  if (hasLogs) {
    state.log.forEach(l => {
      (l.exerciseLogs || []).forEach(ex => {
        const grp = classifyMuscleGroup(ex.plannedName || ex.name || '');
        counts[grp] = (counts[grp] || 0) + 1;
      });
    });
    const total = Object.values(counts).reduce((s, v) => s + v, 0);
    if (total === 0) {
      // Fall back to plan data if logs exist but have no exercise details
      return getMuscleGroupFromPlan();
    }
    return { counts, total, source: 'logged' };
  }
  return getMuscleGroupFromPlan();
}

function getMuscleGroupFromPlan() {
  const counts = { 'Upper Body': 0, 'Lower Body': 0, 'Core': 0, 'Cardio': 0, 'Full Body': 0 };
  if (!state.plan) return { counts, total: 0, source: 'plan' };
  state.plan.weeks.forEach(w => {
    w.workouts.forEach(wo => {
      (wo.exercises || []).forEach(ex => {
        const grp = classifyMuscleGroup(ex.name || '');
        counts[grp] = (counts[grp] || 0) + 1;
      });
    });
  });
  const total = Object.values(counts).reduce((s, v) => s + v, 0);
  return { counts, total, source: 'plan' };
}

function getWorkoutLog(workoutId) {

function _mpExerciseStatusBadge(cs) {
  if (!cs) return '';
  const map = { complete: ['mp-badge-green','Complete'], done: ['mp-badge-green','Complete'],
    partial: ['mp-badge-amber','Partial'], missed: ['mp-badge-rose','Missed'],
    skipped: ['mp-badge-rose','Skipped'], substituted: ['mp-badge-purple','Substituted'],
    extra: ['mp-badge-mint','Extra'] };
  const [cls, label] = map[cs] || ['mp-badge-gray', cs];
  return `<span class="mp-badge ${cls}">${label}</span>`;
}

function _mpIsMeaningfulValue(v) {
  return v !== undefined &&
    v !== null &&
    String(v).trim() !== '' &&
    String(v).trim() !== '-' &&
    String(v).trim().toLowerCase() !== 'null' &&
    String(v).trim().toLowerCase() !== 'undefined';
}

function _mpCleanValue(v) {
  if (!_mpIsMeaningfulValue(v)) return '';
  return String(v).trim();
}

function _mpHasCleanValue(v) {
  return _mpCleanValue(v) !== '';
}

function _mpIsNumericOrRepRange(v) {
  const s = _mpCleanValue(v).toLowerCase();
  if (!s) return false;
  if (s.includes('min') || s.includes('sec') || s.includes('hold') || s.includes('on/') || s.includes('off')) return false;
  if (s.includes('rep')) return false;
  if (s.includes('max')) return false;
  return /\d/.test(s);
}

function _mpIsTimeBasedExercise(planned, logged) {
  const name = `${planned && planned.name || ''} ${logged && logged.plannedName || ''} ${logged && logged.name || ''}`.toLowerCase();
  const reps = `${planned && planned.reps || ''} ${logged && logged.plannedReps || ''} ${logged && logged.actualReps || ''} ${logged && logged.reps || ''}`.toLowerCase();
  return (
    reps.includes('min') ||
    reps.includes('sec') ||
    reps.includes('second') ||
    reps.includes('hold') ||
    reps.includes('on/') ||
    reps.includes('off') ||
    name.includes('treadmill') ||
    name.includes('elliptical') ||
    name.includes('bike') ||
    name.includes('cycling') ||
    name.includes('walk') ||
    name.includes('run') ||
    name.includes('cardio') ||
    name.includes('plank')
  );
}

function _mpFormatSetWord(sets) {
  const n = Number(sets);
  if (Number.isFinite(n) && n === 1) return 'set';
  return 'sets';
}

function _mpFormatRepsLabel(reps, isTimeBased) {
  const r = _mpCleanValue(reps);
  if (!r) return '';
  const lower = r.toLowerCase();
  if (isTimeBased) return r;
  if (lower.includes('rep')) return r;
  if (lower.includes('min') || lower.includes('sec') || lower.includes('hold') || lower.includes('on/') || lower.includes('off')) return r;
  if (lower.includes('each')) return r;
  if (lower.includes('max')) return 'Max reps';
  if (_mpIsNumericOrRepRange(r)) return `${r} reps`;
  return r;
}

function _mpDetectPlannedRepUnit(planned, logged) {
  const raw = _mpCleanValue(
    (planned && planned.reps) ||
    (logged && logged.plannedReps) ||
    ''
  ).toLowerCase();
  if (raw.includes('min')) return 'min';
  if (raw.includes('sec') || raw.includes('second')) return 'sec';
  if (raw.includes('each leg')) return 'each leg';
  if (raw.includes('each')) return 'each';
  if (raw.includes('max')) return 'reps';
  if (raw.includes('rep')) return 'reps';
  return 'reps';
}

function _mpFormatAmountWithContext(value, planned, logged) {
  const v = _mpCleanValue(value);
  if (!v) return '';
  const lower = v.toLowerCase();
  if (
    lower.includes('rep') ||
    lower.includes('min') ||
    lower.includes('sec') ||
    lower.includes('second') ||
    lower.includes('each') ||
    lower.includes('hold') ||
    lower.includes('on/') ||
    lower.includes('off')
  ) return v;
  if (lower.includes('max')) return 'Max reps';
  if (/\d/.test(lower)) {
    const unit = _mpDetectPlannedRepUnit(planned, logged);
    if (unit === 'min') return `${v} min`;
    if (unit === 'sec') return `${v} sec`;
    if (unit === 'each leg') return `${v} each leg`;
    if (unit === 'each') return `${v} each`;
    return `${v} reps`;
  }
  return v;
}

function _mpFormatDisplayWeight(weight, sourceUnit, targetUnit) {
  if (!_mpIsMeaningfulValue(weight)) return '';
  const n = Number(weight);
  if (!Number.isFinite(n) || n <= 0) return '';
  const from = sourceUnit || targetUnit || (state.settings && state.settings.weightUnit) || 'lbs';
  const to = targetUnit || (state.settings && state.settings.weightUnit) || 'lbs';
  let converted = n;
  if (from !== to) {
    if (from === 'kg' && to === 'lbs' && typeof kgToLbs === 'function') converted = kgToLbs(n);
    else if (from === 'lbs' && to === 'kg' && typeof lbsToKg === 'function') converted = lbsToKg(n);
  }
  const rounded = Math.round(converted * 10) / 10;
  const clean = Number.isInteger(rounded) ? String(rounded) : String(rounded);
  return `${clean} ${to}`;
}

function _mpFormatTarget(planned, logged) {
  const sets = (planned && planned.sets != null) ? planned.sets : (logged && logged.plannedSets != null ? logged.plannedSets : null);
  const reps = (planned && planned.reps != null) ? planned.reps : (logged && logged.plannedReps != null ? logged.plannedReps : null);
  const rest = (planned && planned.rest != null) ? planned.rest : (logged && logged.plannedRest != null ? logged.plannedRest : null);
  const hasSets = _mpHasCleanValue(sets);
  const hasReps = _mpHasCleanValue(reps);
  if (!hasSets && !hasReps) return 'Target not specified';
  const isTimeBased = _mpIsTimeBasedExercise(planned, logged);
  const setsNum = hasSets ? Number(_mpCleanValue(sets)) : null;
  const setWord = (setsNum != null && Number.isFinite(setsNum)) ? _mpFormatSetWord(setsNum) : 'sets';
  let txt = '';
  if (hasSets && hasReps) {
    txt = `${_mpCleanValue(sets)} ${setWord} × ${_mpFormatAmountWithContext(reps, planned, logged)}`;
  } else if (hasSets) {
    txt = `${_mpCleanValue(sets)} ${setWord}`;
  } else {
    txt = _mpFormatAmountWithContext(reps, planned, logged);
  }
  if (_mpHasCleanValue(rest) && Number(rest) > 0) txt += ` · Rest ${_mpCleanValue(rest)}s`;
  return txt || 'Target not specified';
}

function _mpFormatResult(logged, fallbackUnit, planned) {
  if (!logged) return 'Not logged';
  const status = logged.completionStatus || logged.status || (logged.skipped ? 'skipped' : null);
  const sets = _mpHasCleanValue(logged.actualSets) ? logged.actualSets : (_mpHasCleanValue(logged.sets) ? logged.sets : null);
  const reps = _mpHasCleanValue(logged.actualReps) ? logged.actualReps : (_mpHasCleanValue(logged.reps) ? logged.reps : null);
  const weight = _mpHasCleanValue(logged.actualWeight) ? logged.actualWeight : (_mpHasCleanValue(logged.weight) ? logged.weight : null);
  const sourceUnit = logged.actualWeightUnit || logged.weightUnit || logged.unit || null;
  const targetUnit = (state.settings && state.settings.weightUnit) || fallbackUnit || 'lbs';
  const isTimeBased = _mpIsTimeBasedExercise(planned, logged);

  if (sets === null && reps === null && weight === null) {
    if (status === 'skipped') return 'Skipped — no work logged';
    if (status === 'partial') return 'Partially completed — details not logged';
    if (status === 'complete' || status === 'done') return 'Completed — details not logged';
    return 'Not logged';
  }

  const setsNum = sets !== null ? Number(sets) : null;
  const setWord = (setsNum != null && Number.isFinite(setsNum)) ? _mpFormatSetWord(setsNum) : 'sets';
  let txt = '';
  if (sets !== null && reps !== null) {
    txt = `${_mpCleanValue(sets)} ${setWord} × ${_mpFormatAmountWithContext(reps, planned, logged)}`;
  } else if (sets !== null) {
    txt = `${_mpCleanValue(sets)} ${setWord}`;
  } else if (reps !== null) {
    txt = _mpFormatAmountWithContext(reps, planned, logged);
  }

  if (!isTimeBased && weight !== null) {
    const weightStr = _mpFormatDisplayWeight(weight, sourceUnit, targetUnit);
    if (weightStr) txt += (txt ? ' · ' : '') + weightStr;
  }

  if (!txt) {
    if (status === 'skipped') return 'Skipped — no work logged';
    if (status === 'partial') return 'Partially completed — details not logged';
    if (status === 'complete' || status === 'done') return 'Completed — details not logged';
    return 'Not logged';
  }
  return txt;
}

function _mpExerciseName(planned, logged, index) {

    (logged && (logged.plannedName || logged.name || logged.substituteName || logged.originalName)) ||
    `Exercise ${index + 1}`;

      <tbody>${rows.join('')}</tbody>
    </table></div>`;
  }

  return `<div class="mp-log-meta">
    <strong>Date:</strong> ${log.date || '—'} &nbsp;|&nbsp;
    ${_mpExerciseStatusBadge(cs)} &nbsp;|&nbsp;
    <strong>Score:</strong> ${score} &nbsp;|&nbsp;
    <strong>Duration:</strong> ${dur} &nbsp;|&nbsp;
    <strong>RPE:</strong> ${rpe}
    ${notes}
  </div>${exSection}`;
}

function renderPlan() {
  if (!state.plan) return;
  const currentWeek = state.user ? getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks) : 1;
  const progress = state.user ? getOverallPlanEffortPct() : 0;
  const daysLeft = state.user ? getDaysLeft(state.user.eventDate) : null;
  const stats = getWorkoutCompletionStats();
  const thisWeekData = state.plan.weeks[currentWeek - 1];
  const thisWeekStats = thisWeekData ? getWeekLogStats(thisWeekData) : null;

  // Find next unlogged workout in current/future weeks
  let nextWorkout = null;
  for (let wi = currentWeek - 1; wi < state.plan.weeks.length && !nextWorkout; wi++) {
    for (const wo of state.plan.weeks[wi].workouts) {
      if (!state.log.find(l => l.workoutId === wo.id)) {
        nextWorkout = { day: wo.day, name: wo.name, weekNum: state.plan.weeks[wi].weekNum };
        break;
      }
    }
  }

  // Plan Command Center
  const phaseName = thisWeekData ? thisWeekData.phaseName : '—';
  const fk = state.user && state.user.focus ? normalizeFocusKey(state.user.focus) : null;
  const focusDisplayLabel = fk ? focusLabel(fk) : (state.user && state.user.focus ? state.user.focus : 'General Fitness');
  const weekEffort = thisWeekStats ? thisWeekStats.effortPct : 0;

    'Phase 3: Peak Effort': 'Push effort while staying recoverable.',
    'Phase 4: Definition': 'Sharpen consistency and finish strong.',
    'Phase 5: Refinement': 'Clean up weak points and protect momentum.',
    'Phase 6: Taper': 'Arrive confident, not exhausted.',

    'linear-gradient(135deg,#3BAE8A,#5EC4A5)',
    'linear-gradient(135deg,#3A9DC8,#60BDE0)',
    'linear-gradient(135deg,#E07A50,#ED9870)',
    'linear-gradient(135deg,#D4547A,#E070A0)',
    'linear-gradient(135deg,#5E3FBE,#9A8FE2)',
    'linear-gradient(135deg,#C89232,#DDB050)',

    { name: 'Phase 1: Foundation', weeks: state.plan.weeks.slice(0, 2), idx: 0 },
    { name: 'Phase 2: Building Momentum', weeks: state.plan.weeks.slice(2, 4), idx: 1 },
    { name: 'Phase 3: Peak Effort', weeks: state.plan.weeks.slice(4, 6), idx: 2 },
    { name: 'Phase 4: Definition', weeks: state.plan.weeks.slice(6, 8), idx: 3 },

let expandedWeekDetail = null;

function toggleWeekDetail(weekNum) {
  const w = state.plan.weeks[weekNum - 1];
  if (!w) return;

  const phaseIndex = weekNum <= 2 ? 0 : weekNum <= 4 ? 1 : weekNum <= 6 ? 2 : weekNum <= 8 ? 3 : weekNum <= 10 ? 4 : 5;
  const phaseNames = ['Phase1Foundation','Phase2BuildingMomentum','Phase3PeakEffort','Phase4Definition','Phase5Refinement','Phase6Taper'];
  const containerId = 'week-detail-container-' + phaseNames[phaseIndex];
  const container = document.getElementById(containerId);
  if (!container) return;

  if (expandedWeekDetail === weekNum) {
    container.innerHTML = '';
    expandedWeekDetail = null;
    return;
  }

  expandedWeekDetail = weekNum;
  const ws = getWeekLogStats(w);

  container.innerHTML = `
    <div class="week-detail-card" style="padding:20px">
      <div style="margin-bottom:14px">
        <div style="font-size:18px;font-weight:800;color:#111827">Week ${w.weekNum}: ${w.narrative.title}</div>

      <div class="wdd-chips">
        <span class="wdd-chip wdd-chip-blue">${w.workouts.length} sessions</span>
        <span class="wdd-chip wdd-chip-blue">RPE ${w.rpe} target</span>
        ${ws.logged > 0 ? `<span class="wdd-chip wdd-chip-green">${ws.logged}/${ws.planned} logged</span>` : ''}
        ${ws.effortPct > 0 ? `<span class="wdd-chip wdd-chip-amber">${ws.effortPct}% effort</span>` : ''}
      </div>
      ${w.workouts.map(wo => {
        const logEntry = state.log.find(l => l.workoutId === wo.id);
        const statusIcon = logEntry
          ? (logEntry.completionStatus === 'complete' || logEntry.completed ? '✓' : logEntry.completionStatus === 'partial' ? '◑' : logEntry.completionStatus === 'missed' ? '✗' : '◑')
          : '';
        const statusColor = logEntry
          ? (logEntry.completionStatus === 'complete' || logEntry.completed ? 'var(--mint)' : logEntry.completionStatus === 'partial' ? '#F59E0B' : logEntry.completionStatus === 'missed' ? '#EF4444' : '#F59E0B')

          <div id="mp-log-detail-${wo.id}" class="mp-log-detail">${detailHtml}</div>
        </div>`;
      }).join('')}
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid #F3F4F6">

function saveMetricEntry() {
  const weight   = document.getElementById('m-weight')?.value;
  const waist    = document.getElementById('m-waist')?.value;
  const energy   = document.getElementById('m-energy')?.value;
  const sleep    = document.getElementById('m-sleep')?.value;
  const soreness = document.getElementById('m-soreness')?.value;
  const notes    = (document.getElementById('m-notes')?.value || '').trim();

  if (!weight && !waist && !energy && !sleep && !soreness) {
    showToast('Enter at least one value to log.');
    return;
  }

  const entry = {
    date: today(),
    weight:   weight   ? +weight   : null,
    waist:    waist    ? +waist    : null,
    energy:   energy   ? +energy   : null,
    sleep:    sleep    ? +sleep    : null,
    soreness: soreness ? +soreness : null,
    notes,
    weightUnit: state.settings.weightUnit || 'lbs',
    waistUnit:  state.settings.measurementUnit || 'in',
  };

  const todayIdx = state.metrics.findIndex(m => m.date === today());
  if (todayIdx >= 0) state.metrics[todayIdx] = entry;
  else state.metrics.push(entry);

  saveMetrics();
  renderTracker();
  renderInsights();
  showToast('Check-in saved!');
}

let _ppsEscHandler = null;

function ppsGetMeta(key) {
  try { return JSON.parse(localStorage.getItem(key + '_meta')) || null; } catch(_) { return null; }
}
function ppsSetMeta(key, label) {
  localStorage.setItem(key + '_meta', JSON.stringify({ addedAt: new Date().toISOString(), label }));
}
function ppsFormatDate(isoStr) {
  if (!isoStr) return 'Added date unavailable';
  try { return 'Added: ' + new Date(isoStr).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
  catch(_) { return 'Added date unavailable'; }
}
function ppsGetTimeline() {
  try { return JSON.parse(localStorage.getItem('vr_photo_timeline')) || []; } catch(_) { return []; }
}
function ppsSaveTimeline(arr) {
  localStorage.setItem('vr_photo_timeline', JSON.stringify(arr));
}
function ppsUpsertTimeline(slot, image, label) {
  const tl  = ppsGetTimeline();
  const idx = tl.findIndex(e => e.slot === slot && slot !== 'progress');
  const entry = { id: slot !== 'progress' ? slot : String(Date.now()), slot, image, addedAt: new Date().toISOString(), label };
  if (idx >= 0) tl[idx] = entry; else tl.push(entry);
  ppsSaveTimeline(tl);
}

function renderPhotoProgressStudio() {
  const before     = localStorage.getItem('vr_photo_before');
  const after      = localStorage.getItem('vr_photo_after');
  const notes      = localStorage.getItem('vr_photo_notes') || '';

  const afterMeta  = ppsGetMeta('vr_photo_after');
  const timeline   = ppsGetTimeline();
  const anyPhoto   = before || after || timeline.length > 0;

  const badgeHtml = (before && after)
    ? `<div class="pps-ready-badge">✓ Comparison Ready</div>` : '';

  function photoCard(key, label, lBg, lColor, data, meta) {
    const dateStr = ppsFormatDate(meta?.addedAt);
    const preview = data
      ? `<div class="pps-preview-area pps-preview-clickable"
              onclick="openPhotoModal('${key}','${label}','${dateStr}')">
           <img src="${data}" alt="${label}">
           <div class="pps-preview-hover-hint">🔍 Click to preview</div>
         </div>`
      : `<div class="pps-preview-area">
           <label class="pps-empty-drop" for="pps-input-${key}">
             <div class="pps-empty-icon">📷</div>
             <div class="pps-empty-text">Click to upload<br><strong>${label}</strong></div>
           </label>
         </div>`;
    const footer = data
      ? `<span class="pps-date-chip">${dateStr}</span>
         <button class="pps-btn pps-btn-delete" onclick="deletePhoto('${key}')">✕ Remove</button>`
      : `<label class="pps-btn pps-btn-upload" for="pps-input-${key}">↑ Upload Photo</label>`;
    return `
      <div class="pps-card">
        <div class="pps-card-label" style="background:${lBg};color:${lColor}">${label}</div>
        ${preview}
        <div class="pps-card-footer">
          <input type="file" id="pps-input-${key}" accept="image/*" style="display:none" onchange="uploadPhoto('${key}',this)">
          ${footer}
        </div>
      </div>`;
  }

  const slotColor = { before:'var(--violet)', after:'var(--mint)', progress:'var(--peach)' };
  const slotName  = { before:'Starting', after:'Current', progress:'Progress' };
  const thumbsHtml = timeline.length === 0
    ? `<div class="pps-timeline-empty">No timeline photos yet. Upload a Week 1 or Current photo, or add a Progress snapshot below.</div>`
    : `<div class="pps-timeline-grid">
        ${timeline.map(e => {
          const d = ppsFormatDate(e.addedAt);
          return `
          <div class="pps-thumb">
            <div class="pps-thumb-img-wrap" onclick="openPhotoModal(null,'${slotName[e.slot]} Photo','${d}','${e.id}')">
              <img src="${e.image}" alt="${e.label}">
              <div class="pps-thumb-overlay">🔍</div>
            </div>
            <div class="pps-thumb-info">
              <div class="pps-thumb-slot" style="color:${slotColor[e.slot]}">${slotName[e.slot]}</div>
              <div class="pps-thumb-date">${d}</div>
            </div>
            <div class="pps-thumb-footer">
              <button class="pps-thumb-del" onclick="deleteTimelinePhoto('${e.id}')">✕ Delete</button>
            </div>
          </div>`; }).join('')}
      </div>`;

  return `
    <div class="pps-section section-gap" id="photo-progress-studio">
      <div class="pps-header">
        <div>
          <div class="pps-title">📸 Photo Progress Studio</div>
          <div class="pps-sub">Compare your Week 1 starting point with your current progress — stored only on this device.</div>
        </div>
        ${badgeHtml}
      </div>

      <div class="pps-grid">
        ${photoCard('vr_photo_before','Week 1 — Starting Photo','var(--lavender-pale)','var(--violet)',before,beforeMeta)}
        ${photoCard('vr_photo_after', 'Current — Progress Photo','var(--mint-pale)','var(--mint)',after,afterMeta)}
      </div>

      <div class="pps-notes-section">
        <div class="pps-notes-label">Visual Progress Notes</div>
        <textarea class="pps-notes-input" id="pps-notes"
          placeholder="What changed visually? Posture, waist, shoulders, confidence, energy…"
          oninput="savePhotoNotes(this.value)">${notes}</textarea>
      </div>

      <div class="pps-timeline-section">
        <div class="pps-timeline-title">Progress Timeline</div>
        <div class="pps-timeline-sub">Every saved photo appears here as a private visual history.</div>
        ${thumbsHtml}
        <div class="pps-timeline-add">
          <input type="file" id="pps-input-timeline" accept="image/*" style="display:none" onchange="uploadTimelinePhoto(this)">
          <label class="pps-btn pps-btn-progress" for="pps-input-timeline">+ Add Progress Snapshot</label>
        </div>
      </div>

        ${anyPhoto ? `<button class="pps-btn pps-btn-clear" onclick="clearPhotoStudio()">Clear Photo Studio</button>` : ''}
      </div>
    </div>`;
}

function _ppsCompress(file, callback) {
  const MAX_W = 1200, QUALITY = 0.75;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { callback(c.toDataURL('image/jpeg', QUALITY), null); }
      catch(err) { callback(null, err); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadPhoto(key, input) {
  const file = input.files[0];
  if (!file) return;
  const large = file.size > 2 * 1024 * 1024;
  _ppsCompress(file, (data, err) => {
    if (err || !data) { showToast('Could not save photo — storage may be full.'); return; }
    const label = key === 'vr_photo_before' ? 'Week 1 — Starting Photo' : 'Current — Progress Photo';
    const slot  = key === 'vr_photo_before' ? 'before' : 'after';
    localStorage.setItem(key, data);
    ppsSetMeta(key, label);
    ppsUpsertTimeline(slot, data, label);
    renderTracker();
    showToast(large ? 'Photo saved (compressed).' : 'Photo saved!');
  });
}

function uploadTimelinePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const tl = ppsGetTimeline();
  if (tl.length >= 8) { showToast('Timeline limit reached (8 max). Delete an older photo first.'); input.value = ''; return; }
  const large = file.size > 2 * 1024 * 1024;
  _ppsCompress(file, (data, err) => {
    if (err || !data) { showToast('Could not save photo — storage may be full.'); return; }
    ppsUpsertTimeline('progress', data, 'Progress Photo');
    renderTracker();
    showToast(large ? 'Snapshot added (compressed).' : 'Progress snapshot added!');
  });
}

function deletePhoto(key) {
  localStorage.removeItem(key);
  localStorage.removeItem(key + '_meta');
  const slot = key === 'vr_photo_before' ? 'before' : 'after';
  ppsSaveTimeline(ppsGetTimeline().filter(e => e.slot !== slot));
  renderTracker();
  showToast('Photo removed.');
}

function deleteTimelinePhoto(id) {
  ppsSaveTimeline(ppsGetTimeline().filter(e => e.id !== id));
  renderTracker();
  showToast('Timeline photo deleted.');
}

function savePhotoNotes(val) {
  localStorage.setItem('vr_photo_notes', val);
}

function clearPhotoStudio() {
  confirmAction('Clear Photo Studio', 'This will remove all photos, timeline entries, and notes from Photo Progress Studio. This cannot be undone.', () => {
    Object.keys(localStorage).filter(k => k.startsWith('vr_photo_')).forEach(k => localStorage.removeItem(k));
    renderTracker();
    showToast('Photo Studio cleared.');
  });
}

function openPhotoModal(key, label, dateStr, timelineId) {
  let src;
  if (timelineId) {
    const entry = ppsGetTimeline().find(e => e.id === timelineId);
    src = entry ? entry.image : null;
  } else {
    src = key ? localStorage.getItem(key) : null;
  }
  if (!src) return;

  let modal = document.getElementById('pps-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'pps-modal';
    document.body.appendChild(modal);
  }
  modal.innerHTML = `
    <div class="pps-modal-inner" onclick="event.stopPropagation()">
      <button class="pps-modal-close" onclick="closePhotoModal()">✕</button>
      <img class="pps-modal-img" src="${src}" alt="${label}">
      <div class="pps-modal-info">
        <div class="pps-modal-label">${label}</div>
        <div class="pps-modal-date">${dateStr}</div>
      </div>
    </div>`;
  modal.className = 'pps-modal open';
  modal.onclick = closePhotoModal;
  document.body.style.overflow = 'hidden';
  _ppsEscHandler = (e) => { if (e.key === 'Escape') closePhotoModal(); };
  document.addEventListener('keydown', _ppsEscHandler);
}

function closePhotoModal() {
  const modal = document.getElementById('pps-modal');
  if (modal) modal.className = 'pps-modal';
  document.body.style.overflow = '';
  if (_ppsEscHandler) { document.removeEventListener('keydown', _ppsEscHandler); _ppsEscHandler = null; }
}

function preserveLoggedWorkoutsInNewPlan(newPlan, oldPlan, logs) {
  const loggedIds = new Set(logs.map(l => l.workoutId));
  const oldById = {};
  (oldPlan.weeks || []).forEach(w => w.workouts.forEach(wo => { oldById[wo.id] = wo; }));

  newPlan.weeks.forEach((newWeek, wi) => {
    newWeek.workouts = newWeek.workouts.map(wo =>
      (loggedIds.has(wo.id) && oldById[wo.id]) ? oldById[wo.id] : wo
    );

    const oldWeek = (oldPlan.weeks || [])[wi];
    if (oldWeek) {
      const newIds = new Set(newWeek.workouts.map(wo => wo.id));
      oldWeek.workouts.forEach(oldWo => {
        if (loggedIds.has(oldWo.id) && !newIds.has(oldWo.id)) {
          newWeek.workouts.push(oldWo);
        }
      });
      newWeek.workouts = sortWorkoutsByChronologicalDay(newWeek.workouts);
    }
  });
}

  const hrs   = document.getElementById('afp-hours').value;

  const updatedUser = Object.assign({}, state.user, { equipment: eq, hours: hrs, focus: focus, fitnessLevel: level });

// ==================== AUDIT HELPER (console only, read-only) ====================
function auditPlanGenerationQuality() {
  const equipments = ['gym', 'home', 'minimal', 'hybrid'];
  const focuses = ['leanness', 'arms', 'core', 'posture', 'endurance', null];
  const levels = ['beginner', 'intermediate', 'advanced'];
  const hourOptions = ['3-5', '5-8', '8+'];

  const BEGINNER_RISKY_NAMES = ['Diamond Push-Ups', 'Ab Wheel', 'Ab Wheel Rollout', 'Pull-Ups', 'Pull-Ups / Assisted Pull-Ups', 'Pull-Ups / Lat Pulldown', 'Hanging Knee Raise', 'Burpees', 'Jump Squats'];

  const SOFT_BEGINNER_RISKY = ['Push-Ups', 'Wide Push-Ups', 'Mountain Climbers', 'Jumping Jacks', 'High Knees', 'Burpees', 'Jump Squats', 'Pike Push-Ups', 'Diamond Push-Ups'];

  const MINIMAL_BLOCKED_TERMS = ['dumbbell', ' db ', '(db)', 'db bicep', 'db row', 'db curl', 'cable', 'machine', 'leg press', 'lat pulldown', 'bench press', 'treadmill', 'elliptical', 'stationary bike', 'rope tricep', 'resistance band', 'farmer carry', 'chest-supported row', 'barbell', 'weighted curl', 'tricep pressdown'];
  const HOME_BLOCKED_TERMS = ['cable chest press', 'seated cable row', 'rope tricep', 'leg press', 'lat pulldown', 'treadmill', 'elliptical', 'stationary bike', 'smith machine', 'barbell squat', 'barbell bench', 'barbell row', 'cable pull-through', 'cable pullover', 'cable crunch', 'pallof press', 'cable curl', 'resistance band', 'band pull-apart'];

  const results = {};
  const allRepeatedFocusAddons = [];
  const allSoftBeginnerWarnings = [];
  const allHoursDensityWarnings = [];

  const fakeUser = (eq, focus, level, hours) => ({
    fitnessLevel: level,
    equipment: eq,
    focus: focus,
    hours: hours || '5-8',
    eventDate: new Date(Date.now() + 60 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10),
    setupDate: new Date().toISOString().slice(0, 10),
  });

  equipments.forEach(eq => {
    focuses.forEach(focus => {
      levels.forEach(level => {
        hourOptions.forEach(hours => {
        const key = `${eq}/${focus || 'balanced'}/${level}/${hours}`;
        const user = fakeUser(eq, focus, level, hours);
        let plan;
        try { plan = generatePlan(user); } catch(e) { results[key] = { error: e.message }; return; }

        const allExercises = [];
        const sampleWeeks = [1, 2, 5, 8].map(wn => plan.weeks[wn - 1]).filter(Boolean);

        plan.weeks.forEach(week => {
          week.workouts.forEach(wo => {
            wo.exercises.forEach(ex => allExercises.push({ name: ex.name, week: week.weekNum, workout: wo.name }));
          });
        });

        const riskyBeginner = level === 'beginner'
          ? allExercises.filter(e => BEGINNER_RISKY_NAMES.some(r => e.name.includes(r)))
          : [];

        const equipmentMismatch = eq === 'minimal'
          ? allExercises.filter(e => MINIMAL_BLOCKED_TERMS.some(t => e.name.toLowerCase().includes(t)) || /^db\b/.test(e.name.toLowerCase()))
          : eq === 'home'
          ? allExercises.filter(e => HOME_BLOCKED_TERMS.some(t => e.name.toLowerCase().includes(t)))
          : [];

        // Check duplicates within each workout
        const duplicateExercises = [];
        plan.weeks.forEach(week => {
          week.workouts.forEach(wo => {
            const names = wo.exercises.map(e => e.name);
            const seen = new Set();
            names.forEach(n => {
              if (seen.has(n)) duplicateExercises.push({ name: n, week: week.weekNum, workout: wo.name });
              seen.add(n);
            });
          });
        });

        // Check repeated focus add-ons within same week
        // Only flag exercises that appear in the focused plan but NOT in a baseline balanced plan
        if (focus) {
          const balancedUser = fakeUser(eq, null, level, hours);
          let balancedPlan;
          try { balancedPlan = generatePlan(balancedUser); } catch(e) { balancedPlan = null; }

          const focusPool = (FOCUS_POOLS_BY_EQ[focus] || {})[eq] || (FOCUS_POOLS_BY_EQ[focus] || {})['gym'] || [];
          const focusNames = new Set(focusPool.map(p => p.name));

          sampleWeeks.forEach(week => {
            const balancedWeek = balancedPlan?.weeks[week.weekNum - 1];
            const trueAddonsInWeek = [];

            week.workouts.forEach((wo, woIdx) => {
              const balancedWo = balancedWeek?.workouts[woIdx];
              const balancedNames = new Set((balancedWo?.exercises || []).map(e => e.name));
              wo.exercises.forEach(ex => {
                // True focus add-on: in the focus pool AND absent from the balanced workout
                if (focusNames.has(ex.name) && !balancedNames.has(ex.name)) {
                  trueAddonsInWeek.push(ex.name);
                }
              });
            });

            if (trueAddonsInWeek.length >= 2) {
              const countMap = {};
              trueAddonsInWeek.forEach(n => { countMap[n] = (countMap[n] || 0) + 1; });
              Object.entries(countMap).forEach(([name, cnt]) => {
                if (cnt === week.workouts.length) {
                  allRepeatedFocusAddons.push({ combo: key, week: week.weekNum, repeatedExercise: name });
                }
              });
            }
          });
        }

        // Soft beginner warnings for home/minimal
        if (level === 'beginner' && (eq === 'home' || eq === 'minimal')) {
          allExercises.forEach(e => {
            if (SOFT_BEGINNER_RISKY.some(r => e.name === r)) {
              allSoftBeginnerWarnings.push({ combo: key, exercise: e.name, week: e.week });
            }
          });
        }

        const focusHits = focus ? allExercises.filter(e => {
          const pool = (FOCUS_POOLS_BY_EQ[focus] || {})[eq] || (FOCUS_POOLS_BY_EQ[focus] || {})['gym'] || [];
          return pool.some(p => p.name === e.name);
        }) : [];

        // Hours density checks
        const planDaysPerWeek = plan.weeks.map(w => w.workouts.length);
        if (hours === '8+' && level === 'beginner') {
          const tooMany = planDaysPerWeek.filter(d => d > 3);
          if (tooMany.length) allHoursDensityWarnings.push({ combo: key, issue: 'beginner 8+ exceeds 3 days/week', days: tooMany });
        }
        if (hours === '8+') {
          const taperWeeks = plan.weeks.filter(w => w.phaseName === 'Taper & Confidence');
          const baselineUser = fakeUser(eq, focus, level, '5-8');
          let baselinePlan;
          try { baselinePlan = generatePlan(baselineUser); } catch(e) { baselinePlan = null; }
          if (baselinePlan) {
            taperWeeks.forEach(tw => {
              const baseTaper = baselinePlan.weeks.find(bw => bw.weekNum === tw.weekNum);
              if (baseTaper && tw.workouts.length > baseTaper.workouts.length) {
                allHoursDensityWarnings.push({ combo: key, issue: 'taper phase more intense at 8+ than 5-8', week: tw.weekNum });
              }
            });
          }
        }
        if (hours === '3-5') {
          const baselineUser = fakeUser(eq, focus, level, '5-8');
          let baselinePlan;
          try { baselinePlan = generatePlan(baselineUser); } catch(e) { baselinePlan = null; }
          if (baselinePlan) {
            plan.weeks.forEach((wk, i) => {
              const bWk = baselinePlan.weeks[i];
              if (bWk && wk.workouts.length > bWk.workouts.length) {
                allHoursDensityWarnings.push({ combo: key, issue: '3-5 hrs produced more days than 5-8', week: wk.weekNum });
              }
            });
          }
        }

        results[key] = {
          totalExercises: allExercises.length,
          riskyBeginner: riskyBeginner.map(e => e.name + ' (wk' + e.week + ')'),
          equipmentMismatch: equipmentMismatch.map(e => e.name + ' (wk' + e.week + ')'),
          duplicateExercises: duplicateExercises.map(e => e.name + ' (wk' + e.week + ')'),
          focusHitCount: focusHits.length,
          daysPerWeek: planDaysPerWeek,
          sampleExercises: sampleWeeks.map(w => ({
            week: w.weekNum,
            workouts: w.workouts.map(wo => ({ name: wo.name, exercises: wo.exercises.map(e => e.name) }))
          })),
        };
        }); // end hourOptions
      });
    });
  });

  const fitnessLevelAdjustAvailable = !!document.getElementById('afp-fitness-level');

  const settingsEquipmentOptions = [
    { label: 'Full Gym', value: 'gym' },
    { label: 'Home / Dumbbells', value: 'home' },
    { label: 'Minimal / Bodyweight', value: 'minimal' },
    { label: 'Gym + Home', value: 'hybrid' },
  ];

  const settingsFitnessLevelOptions = [
    { label: 'Beginner', value: 'beginner' },
    { label: 'Intermediate', value: 'intermediate' },
    { label: 'Advanced', value: 'advanced' },
  ];

  const expectedCombinations = equipments.length * focuses.length * levels.length * hourOptions.length;
  const totalCombinations = Object.keys(results).length;
  const missingCombinations = [];
  equipments.forEach(eq => focuses.forEach(fk => levels.forEach(lv => hourOptions.forEach(hrs => {
    const key = `${eq}/${fk || 'balanced'}/${lv}/${hrs}`;
    if (!results[key] || results[key].error) missingCombinations.push(key);
  }))));

  // Advanced hours effectiveness check
  const allAdvancedHoursWarnings = [];
  equipments.forEach(eq => {
    focuses.forEach(fk => {
      const fkLabel = fk || 'balanced';
      const key35  = `${eq}/${fkLabel}/advanced/3-5`;
      const key58  = `${eq}/${fkLabel}/advanced/5-8`;
      const key8p  = `${eq}/${fkLabel}/advanced/8+`;
      const r35  = results[key35];
      const r58  = results[key58];
      const r8p  = results[key8p];
      if (!r35 || !r58 || !r8p) return;

      const days35 = r35.daysPerWeek || [];
      const days58 = r58.daysPerWeek || [];
      const days8p = r8p.daysPerWeek || [];

      if (JSON.stringify(days35) === JSON.stringify(days58)) {
        allAdvancedHoursWarnings.push({ combo: `${eq}/${fkLabel}/advanced`, issue: '3-5 daysPerWeek equals 5-8' });
      }
      if (JSON.stringify(days58) === JSON.stringify(days8p)) {
        allAdvancedHoursWarnings.push({ combo: `${eq}/${fkLabel}/advanced`, issue: '5-8 daysPerWeek equals 8+' });
      }
      // Check if 8+ ever exceeds 5-8 in a non-taper week (by position)
      const taperFakeUser = fakeUser(eq, fk, 'advanced', '8+');
      let taperCheckPlan;
      try { taperCheckPlan = generatePlan(taperFakeUser); } catch(e) { taperCheckPlan = null; }
      const hasFiveDayNonTaper = taperCheckPlan
        ? taperCheckPlan.weeks.some(w => w.phaseName !== 'Taper & Confidence' && w.workouts.length >= 5)
        : days8p.some(d => d >= 5);
      if (!hasFiveDayNonTaper) {
        allAdvancedHoursWarnings.push({ combo: `${eq}/${fkLabel}/advanced`, issue: '8+ never exceeds 5-8 days in any non-taper week' });
      }
    });
  });

  // fiveDaySupportAvailable: does any advanced 8+ combo produce a 5-day week?
  const fiveDaySupportAvailable = Object.entries(results).some(([k, v]) =>
    k.includes('/advanced/8+') && (v.daysPerWeek || []).some(d => d >= 5)
  );

  // loggedWorkoutOrphanPreservationTest: simulate a reduction in density and confirm logged orphan is preserved
  let loggedWorkoutOrphanPreservationTest = { passed: false, detail: '' };
  try {
    const testUser8p = fakeUser('gym', null, 'advanced', '8+');
    const testPlan8p = generatePlan(testUser8p);
    // Find a week that has a 5th-day (Tuesday) workout
    let orphanWeek = testPlan8p.weeks.find(w => w.workouts.some(wo => wo.day === 'Tuesday'));
    if (!orphanWeek) orphanWeek = testPlan8p.weeks.find(w => w.workouts.length >= 4);
    const orphanWo = orphanWeek ? (orphanWeek.workouts.find(wo => wo.day === 'Tuesday') || orphanWeek.workouts[orphanWeek.workouts.length - 1]) : null;

    if (orphanWo) {
      const fakeLogs = [{ workoutId: orphanWo.id, date: '2026-01-01' }];
      const testUser35 = fakeUser('gym', null, 'advanced', '3-5');
      const testPlan35 = generatePlan(testUser35);
      // Deep clone to avoid mutating
      const clonedNewPlan = JSON.parse(JSON.stringify(testPlan35));
      preserveLoggedWorkoutsInNewPlan(clonedNewPlan, testPlan8p, fakeLogs);
      const preserved = clonedNewPlan.weeks.some(w => w.workouts.some(wo => wo.id === orphanWo.id));
      loggedWorkoutOrphanPreservationTest = { passed: preserved, detail: preserved ? 'orphan workout reinserted' : `orphan ${orphanWo.id} not found in preserved plan` };
    } else {
      loggedWorkoutOrphanPreservationTest = { passed: true, detail: 'no orphan candidate found; skipped' };
    }
  } catch(e) {
    loggedWorkoutOrphanPreservationTest = { passed: false, detail: e.message };
  }

  // dayOrderWarnings: flag any week where workouts are not in chronological order
  const dayOrderWarnings = [];
  try {
    const testUserDO = fakeUser('gym', null, 'advanced', '8+');
    const testPlanDO = generatePlan(testUserDO);
    testPlanDO.weeks.forEach(w => {
      const days = w.workouts.map(wo => wo.day);
      const sorted = sortWorkoutsByChronologicalDay(w.workouts).map(wo => wo.day);
      if (JSON.stringify(days) !== JSON.stringify(sorted)) {
        dayOrderWarnings.push({ week: w.weekNum, actual: days, expected: sorted });
      }
    });
  } catch(e) {
    dayOrderWarnings.push({ error: e.message });
  }

  // weeklyCalendarDayOrderTest: confirm SLOT_DAYS is chronological
  let weeklyCalendarDayOrderTest = { passed: false };
  try {
    // getWeeklyCalendarData now uses CHRONO_DAY_ORDER — verify the constant itself is correct
    const isChronological = CHRONO_DAY_ORDER.every((d, i) => {
      if (i === 0) return true;
      return CHRONO_DAY_ORDER.indexOf(d) > CHRONO_DAY_ORDER.indexOf(CHRONO_DAY_ORDER[i - 1]);
    });
    const correctOrder = JSON.stringify(CHRONO_DAY_ORDER) === JSON.stringify(['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']);
    weeklyCalendarDayOrderTest = { passed: isChronological && correctOrder };
  } catch(e) {
    weeklyCalendarDayOrderTest = { passed: false, error: e.message };
  }

  // fiveDayUiOrderTest: generate an advanced 8+ plan, find 5-day week, confirm chronological order
  let fiveDayUiOrderTest = { passed: false };
  try {
    const testUser5d = fakeUser('gym', null, 'advanced', '8+');
    const testPlan5d = generatePlan(testUser5d);
    const fiveWeek = testPlan5d.weeks.find(w => w.workouts.length >= 5);
    if (fiveWeek) {
      const days = fiveWeek.workouts.map(wo => wo.day);
      const sorted = sortWorkoutsByChronologicalDay(fiveWeek.workouts).map(wo => wo.day);
      fiveDayUiOrderTest = { passed: JSON.stringify(days) === JSON.stringify(sorted), actual: days };
    } else {
      fiveDayUiOrderTest = { passed: true, detail: 'no 5-day week found; skipped' };
    }
  } catch(e) {
    fiveDayUiOrderTest = { passed: false, error: e.message };
  }

  // Summary
  const issues = Object.entries(results).filter(([k, v]) => v.riskyBeginner?.length || v.equipmentMismatch?.length || v.duplicateExercises?.length);
  console.log('=== AUDIT SUMMARY ===');
  console.log(`totalCombinations: ${totalCombinations} / expectedCombinations: ${expectedCombinations}`);
  if (missingCombinations.length) console.warn('Missing combinations:', missingCombinations);
  if (issues.length === 0) {
    console.log('No equipment/risky/duplicate issues found.');
  } else {
    issues.forEach(([k, v]) => {
      if (v.riskyBeginner?.length)    console.warn(`[${k}] Risky beginner:`, v.riskyBeginner);
      if (v.equipmentMismatch?.length) console.warn(`[${k}] Equipment mismatch:`, v.equipmentMismatch);
      if (v.duplicateExercises?.length) console.warn(`[${k}] Duplicates:`, v.duplicateExercises);
    });
  }
  if (allRepeatedFocusAddons.length) console.warn('Repeated focus addons:', allRepeatedFocusAddons);
  if (allSoftBeginnerWarnings.length) console.warn('Soft beginner warnings:', allSoftBeginnerWarnings);
  if (allHoursDensityWarnings.length) console.warn('Hours density warnings:', allHoursDensityWarnings);
  else console.log('No hoursDensityWarnings.');
  if (allAdvancedHoursWarnings.length) console.warn('Advanced hours effectiveness warnings:', allAdvancedHoursWarnings);
  else console.log('advancedHoursEffectivenessWarnings: clean');
  console.log('fiveDaySupportAvailable:', fiveDaySupportAvailable);
  console.log('loggedWorkoutOrphanPreservationTest:', loggedWorkoutOrphanPreservationTest);
  if (dayOrderWarnings.length) console.warn('dayOrderWarnings:', dayOrderWarnings);
  else console.log('dayOrderWarnings: []');
  console.log('weeklyCalendarDayOrderTest:', weeklyCalendarDayOrderTest);
  console.log('fiveDayUiOrderTest:', fiveDayUiOrderTest);
  console.log('Full results:', results);
  return {
    results,
    totalCombinations,
    expectedCombinations,
    missingCombinations,
    repeatedFocusAddons: allRepeatedFocusAddons,
    softBeginnerWarnings: allSoftBeginnerWarnings,
    hoursDensityWarnings: allHoursDensityWarnings,
    advancedHoursEffectivenessWarnings: allAdvancedHoursWarnings,
    fiveDaySupportAvailable,
    loggedWorkoutOrphanPreservationTest,
    dayOrderWarnings,
    weeklyCalendarDayOrderTest,
    fiveDayUiOrderTest,
    fitnessLevelAdjustAvailable,
    settingsEquipmentOptions,
    settingsFitnessLevelOptions,
  };
}

function renderInsights() {
  if (!state.plan || !state.user) return;
  const totalPlanned = state.plan.weeks.reduce((s, w) => s + w.workouts.length, 0);
  const totalLogged = new Set(state.log.map(l => l.workoutId)).size;
  const currentWeek = getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks);
  const progress = getOverallPlanEffortPct();
  const weightEntries = state.metrics.filter(m => m.weight);
  const currentWeightUnit = state.settings.weightUnit || 'lbs';
  const _toDisplayW = (entry) => entry
    ? (formatDisplayWeight(entry.weight, entry.weightUnit || currentWeightUnit, currentWeightUnit) ?? entry.weight)
    : null;
  const firstW = weightEntries.length > 0 ? _toDisplayW(weightEntries[0]) : null;
  const lastW  = weightEntries.length > 0 ? _toDisplayW(weightEntries[weightEntries.length - 1]) : null;
  const weightChange = firstW != null && lastW != null ? (lastW - firstW).toFixed(1) : null;

  // ── Analytics data ─────────────────────────────────────────────
  const weekStats = state.plan.weeks.map(w => getWeekLogStats(w));
  const partialCount = state.log.filter(l => l.completionStatus === 'partial').length;
  const streak = calculateDayStreak(state.metrics || []);

  // Best week by effort
  let bestWeekNum = null, bestWeekPct = 0;
  weekStats.forEach((s, i) => {
    if (s.effortPct > bestWeekPct) { bestWeekPct = s.effortPct; bestWeekNum = i + 1; }
  });

  // PR map: normalize all weights to lbs for comparison, then display in current unit
  const _dispUnit = state.settings.weightUnit || 'lbs';
  const prMap = {};
  state.log.forEach(l => {
    (l.exerciseLogs || []).forEach(ex => {
      if (!ex.actualWeight) return;
      const rawW = parseFloat(String(ex.actualWeight).replace(/[^\d.]/g, ''));
      if (isNaN(rawW) || rawW <= 0) return;
      const srcUnit = ex.actualWeightUnit || _dispUnit;
      const wLbs = srcUnit === 'kg' ? kgToLbs(rawW) : rawW;
      const name = (ex.plannedName || '').trim() || 'Unknown';
      if (!prMap[name] || wLbs > prMap[name].wLbs) {
        prMap[name] = { wLbs, srcUnit, rawW, reps: ex.actualReps || '', date: l.date || '' };
      }
    });
  });
  const prEntries = Object.entries(prMap)
    .sort((a, b) => b[1].wLbs - a[1].wLbs)
    .map(([name, d]) => [name, { ...d, displayW: formatDisplayWeight(d.wLbs, 'lbs', _dispUnit) ?? d.rawW }]);

  // ── Helper: volume bar chart ────────────────────────────────────
  const maxPlanned = Math.max(...weekStats.map(s => s.planned), 1);
  const barMaxH = 56; // px height for full bar

  function volBars() {
    const any = weekStats.some(s => s.logged > 0);
    if (!any) return `<div class="aa-empty">Log workouts to see your weekly volume trend.</div>`;
    const cols = weekStats.map((s, i) => {
      const totalH = s.planned > 0 ? Math.round((s.planned / maxPlanned) * barMaxH) : 0;
      const cH = s.planned > 0 ? Math.round((s.complete / maxPlanned) * barMaxH) : 0;
      const pH = s.planned > 0 ? Math.round((s.partial / maxPlanned) * barMaxH) : 0;
      const loggedH = cH + pH;
      const emptyH = totalH - loggedH;
      return `<div class="aa-bar-col">
        <div class="aa-bar-count">${s.logged > 0 ? s.logged : ' '}</div>
        <div class="aa-bar-body">

        <div class="aa-legend-item"><div class="aa-legend-dot" style="background:#F59E0B"></div>Partial</div>

    const any = weekStats.some(s => s.effortPct > 0);

function drawWeightChart(entries) {
  const canvas = document.getElementById('weight-chart');
  if (!canvas) return;

  // High-DPI setup
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const cssW = rect.width || canvas.parentElement.clientWidth || 600;
  const cssH = 180;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = cssW, h = cssH;
  const pad = { top: 16, right: 16, bottom: 34, left: 46 };
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  const displayUnit = state.settings.weightUnit || 'lbs';
  const chartEntries = entries.map(e => {
    const sourceUnit = e.weightUnit || displayUnit;
    const converted = formatDisplayWeight(e.weight, sourceUnit, displayUnit);
    return { ...e, displayWeight: converted != null ? converted : e.weight };
  });

  const vals = chartEntries.map(e => e.displayWeight);
  const rawMin = Math.min(...vals), rawMax = Math.max(...vals);
  const spread = rawMax - rawMin || 2;
  const min = rawMin - spread * 0.25;
  const max = rawMax + spread * 0.25;

  const xOf = i => pad.left + (entries.length === 1 ? plotW / 2 : i * plotW / (entries.length - 1));
  const yOf = v => pad.top + plotH - ((v - min) / (max - min)) * plotH;

  ctx.clearRect(0, 0, w, h);

  // Subtle background
  ctx.fillStyle = '#FAFBFF';
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, 12);
  ctx.fill();

  // Horizontal grid lines
  ctx.strokeStyle = '#E8EDF5';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + plotH * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    const val = (max - (max - min) * i / 4).toFixed(1);
    ctx.fillStyle = '#A0AEC0';
    ctx.font = `${Math.max(10, 11)}px -apple-system,BlinkMacSystemFont,sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(val, pad.left - 6, y + 4);
  }

  if (entries.length < 2) return;

  // Filled area gradient under line
  const areaGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
  areaGrad.addColorStop(0, 'rgba(44,95,141,0.18)');
  areaGrad.addColorStop(1, 'rgba(44,95,141,0.01)');
  ctx.beginPath();
  chartEntries.forEach((e, i) => {
    const x = xOf(i), y = yOf(e.displayWeight);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(xOf(chartEntries.length - 1), pad.top + plotH);
  ctx.lineTo(xOf(0), pad.top + plotH);
  ctx.closePath();
  ctx.fillStyle = areaGrad;
  ctx.fill();

  // Main line — gradient stroke
  const lineGrad = ctx.createLinearGradient(pad.left, 0, w - pad.right, 0);
  lineGrad.addColorStop(0, '#6BA3D6');
  lineGrad.addColorStop(1, '#2C5F8D');
  ctx.beginPath();
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  chartEntries.forEach((e, i) => {
    const x = xOf(i), y = yOf(e.displayWeight);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Data point dots
  chartEntries.forEach((e, i) => {
    const x = xOf(i), y = yOf(e.displayWeight);
    const isLast = i === chartEntries.length - 1;
    // outer ring
    ctx.beginPath();
    ctx.arc(x, y, isLast ? 7 : 4.5, 0, Math.PI * 2);
    ctx.fillStyle = isLast ? '#2C5F8D' : '#6BA3D6';
    ctx.fill();
    // white center
    ctx.beginPath();
    ctx.arc(x, y, isLast ? 3.5 : 2, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  });

  // Latest value label
  const last = chartEntries[chartEntries.length - 1];
  const lx = xOf(chartEntries.length - 1), ly = yOf(last.displayWeight);
  const unit = displayUnit;
  const labelTxt = `${last.displayWeight} ${unit}`;
  ctx.font = `bold 11px -apple-system,BlinkMacSystemFont,sans-serif`;
  const tw = ctx.measureText(labelTxt).width;
  const lbx = Math.min(lx - tw / 2, w - pad.right - tw - 2);
  const lby = ly - 13;
  ctx.fillStyle = '#2C5F8D';
  ctx.textAlign = 'left';
  ctx.fillText(labelTxt, lbx, lby);

  // X-axis date labels
  ctx.fillStyle = '#A0AEC0';
  ctx.font = `10px -apple-system,BlinkMacSystemFont,sans-serif`;
  ctx.textAlign = 'center';
  const maxLabels = Math.max(2, Math.floor(plotW / 52));
  const step = Math.max(1, Math.round((entries.length - 1) / (maxLabels - 1)));
  entries.forEach((e, i) => {
    if (i % step === 0 || i === entries.length - 1) {
      const x = xOf(i);
      const d = new Date(e.date + 'T00:00:00');
      ctx.fillText(`${d.getMonth()+1}/${d.getDate()}`, x, h - 8);
    }
  });

  // Mini insight text below chart
  const insightEl = document.getElementById('wc-insight');
  if (insightEl) {
    const first = chartEntries[0].displayWeight;
    const change = (last.displayWeight - first).toFixed(1);
    const sign = change > 0 ? '+' : '';
    let trend = 'Stable trend';
    if (change < -0.5)  trend = 'Downward trend';
    else if (change > 0.5) trend = 'Upward trend';
    insightEl.textContent = `Latest: ${last.displayWeight} ${unit}  ·  Change: ${sign}${change} ${unit}  ·  ${trend}`;
  }

  // Store hit-test points for click/tap interactions
  canvas._weightChartPoints = chartEntries.map((e, i) => ({
    x: xOf(i), y: yOf(e.displayWeight),
    date: e.date, weight: e.displayWeight, unit: displayUnit
  }));

  attachWeightChartInteractions(canvas);
}

function attachWeightChartInteractions(canvas) {
  function handleInteraction(clientX, clientY) {
    const points = canvas._weightChartPoints;
    if (!points || points.length === 0) return;
    const rect = canvas.getBoundingClientRect();
    const cssX = clientX - rect.left;
    const cssY = clientY - rect.top;
    let nearest = null, minDist = Infinity;
    points.forEach((p, i) => {
      const d = Math.hypot(p.x - cssX, p.y - cssY);
      if (d < minDist) { minDist = d; nearest = { p, i }; }
    });
    const tooltip = document.getElementById('weight-chart-tooltip');
    if (!tooltip) return;
    if (!nearest || minDist > 22) {
      tooltip.classList.add('hidden');
      canvas._selectedWeightPointIndex = null;
      return;
    }
    const { p, i } = nearest;
    canvas._selectedWeightPointIndex = i;
    const d = new Date(p.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    tooltip.textContent = `${dateStr} · ${p.weight} ${p.unit}`;
    const wrapRect = canvas.parentElement.getBoundingClientRect();
    const tooltipHalfW = 90;
    let left = p.x;
    left = Math.max(tooltipHalfW, Math.min(left, rect.width - tooltipHalfW));
    tooltip.style.left = left + 'px';
    const topPos = p.y - 4;
    const showBelow = p.y < 30;
    tooltip.style.top = showBelow ? (p.y + 28) + 'px' : topPos + 'px';
    tooltip.style.transform = showBelow ? 'translate(-50%, 0)' : 'translate(-50%, -100%)';
    tooltip.classList.remove('hidden');
  }

  canvas.onclick = function(evt) {
    handleInteraction(evt.clientX, evt.clientY);
  };
  canvas.ontouchstart = function(evt) {
    evt.preventDefault();
    const t = evt.touches[0];
    handleInteraction(t.clientX, t.clientY);
  };
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.user || !data.plan) { showToast('Invalid backup file.'); return; }
      state.user = data.user;
      state.plan = data.plan;
      state.log = data.log || [];
      state.metrics = data.metrics || [];
      state.settings = data.settings || { weightUnit: 'lbs' };
      saveUser(); savePlan(); saveLog(); saveMetrics(); saveSettings();
      if (data.photo_before)      localStorage.setItem('vr_photo_before',      data.photo_before);
      if (data.photo_after)       localStorage.setItem('vr_photo_after',       data.photo_after);
      if (data.photo_notes)       localStorage.setItem('vr_photo_notes',       data.photo_notes);
      if (data.photo_before_meta) localStorage.setItem('vr_photo_before_meta', data.photo_before_meta);
      if (data.photo_after_meta)  localStorage.setItem('vr_photo_after_meta',  data.photo_after_meta);
      if (data.photo_timeline)    localStorage.setItem('vr_photo_timeline',    data.photo_timeline);
      if (typeof normalizeLegacyLogs === 'function') normalizeLegacyLogs();
      if (typeof runUnitMigration === 'function') runUnitMigration();
      const narrativesChanged = refreshPlanNarrativesFromDynamicCopy(state.plan, state.user);
      if (narrativesChanged) savePlan();
      initMainApp();
      showToast('Backup restored successfully!');
    } catch(err) {
      showToast('Failed to import — invalid file.');
    }
  };
  reader.readAsText(file);
}

// ==================== NARRATIVE MIGRATION ====================

function refreshPlanNarrativesFromDynamicCopy(plan, user) {
  if (!plan || !Array.isArray(plan.weeks) || typeof getWeekMindsetCopy !== 'function') return false;
  if (!user) return false;

  let changed = false;

  plan.weeks.forEach(week => {
    const sessionCount = (week.workouts || []).length;
    const nextNarrative = getWeekMindsetCopy(week.weekNum, week.phaseName, sessionCount, user.focus, user.fitnessLevel);
    if (!nextNarrative) return;

    const oldTitle = week.narrative?.title || '';
    const oldBody  = week.narrative?.body  || '';
    const newTitle = nextNarrative.title   || oldTitle;
    const newBody  = nextNarrative.body    || '';

    if (oldTitle !== newTitle || oldBody !== newBody) {
      week.narrative = { title: newTitle, body: newBody };
      changed = true;
    }
  });

  return changed;
}

  try {
    emptyMetricsReturnsZero = calculateDayStreak([]) === 0;
    singleDayReturnsOne = calculateDayStreak([{date:'2026-06-09'}]) === 1;
    consecutiveFiveDaysReturnsFive = calculateDayStreak([
      {date:'2026-06-05'},{date:'2026-06-06'},{date:'2026-06-07'},
      {date:'2026-06-08'},{date:'2026-06-09'}
    ]) === 5;
    gapStopsAtLatestRun = calculateDayStreak([
      {date:'2026-06-01'},{date:'2026-06-02'},{date:'2026-06-05'},{date:'2026-06-06'}
    ]) === 2;
    unorderedDatesHandled = calculateDayStreak([
      {date:'2026-06-08'},{date:'2026-06-06'},{date:'2026-06-07'},{date:'2026-06-09'},{date:'2026-06-05'}
    ]) === 5;
    duplicateDatesHandled = calculateDayStreak([
      {date:'2026-06-08'},{date:'2026-06-08'},{date:'2026-06-09'},{date:'2026-06-09'}
    ]) === 2;
    // Latest date anchor: imported data where latest date is not today still shows streak
    latestDateAnchorUsed = calculateDayStreak([
      {date:'2025-01-01'},{date:'2025-01-02'},{date:'2025-01-03'}
    ]) === 3;
  } catch(e) {}

  const currentStateMetricCount = (state && state.metrics) ? state.metrics.length : 0;
  const currentStateDayStreak = (state && state.metrics) ? calculateDayStreak(state.metrics) : 0;

  // Reasonable if: 0 metrics => 0 streak is fine; many consecutive metrics => streak > 1
  let currentStateStreakReasonable = false;
  try {
    if (currentStateMetricCount === 0) {
      currentStateStreakReasonable = currentStateDayStreak === 0;
    } else if (currentStateMetricCount === 1) {
      currentStateStreakReasonable = currentStateDayStreak === 1;
    } else {
      // If there are >= 7 metrics and no gap in latest run, streak should be > 1
      const dates = getUniqueMetricDates(state.metrics);
      const lastDate = dates[dates.length - 1];
      const prevDate = dates[dates.length - 2];
      const isLastTwoConsecutive = lastDate && prevDate &&
        addDaysToDateString(prevDate, 1) === lastDate;
      if (currentStateMetricCount >= 7 && isLastTwoConsecutive) {
        currentStateStreakReasonable = currentStateDayStreak > 1;
      } else {
        currentStateStreakReasonable = currentStateDayStreak >= 1;
      }
    }
  } catch(e) {}

  const result = {
    helperExists,
    emptyMetricsReturnsZero,
    singleDayReturnsOne,
    consecutiveFiveDaysReturnsFive,
    gapStopsAtLatestRun,
    unorderedDatesHandled,
    duplicateDatesHandled,
    latestDateAnchorUsed,
    currentStateStreakReasonable,
    currentStateMetricCount,
    currentStateDayStreak
  };
  console.table(result);
  return result;
}
window.auditDayStreakCalculation = auditDayStreakCalculation;

// ==================== FINAL SCREENSHOT READINESS AUDIT ====================

function auditFinalScreenshotReadiness() {
  let myPlanTextQualityClean = false;
  let myPlanUnitFormattingClean = false;
  let myPlanDetailMappingClean = false;
  let trackerAllHistoryClean = false;
  let premiumScreenshotUxClean = false;
  let visibleMyPlanTextClean = false;
  const allCoreAuditsAvailable =
    typeof auditMyPlanLogTextQuality === 'function' &&
    typeof auditMyPlanLogUnitFormatting === 'function' &&
    typeof auditMyPlanWorkoutDetailMapping === 'function' &&
    typeof auditPremiumScreenshotUxFixes === 'function' &&
    typeof auditVisibleMyPlanLogText === 'function';
  try {
    const tq = auditMyPlanLogTextQuality();
    myPlanTextQualityClean = Object.values(tq).every(Boolean);
  } catch(e) {}
  try {
    const uf = auditMyPlanLogUnitFormatting();
    myPlanUnitFormattingClean = Object.values(uf).every(Boolean);
  } catch(e) {}
  try {
    const dm = auditMyPlanWorkoutDetailMapping();
    myPlanDetailMappingClean = Object.values(dm).every(Boolean);
  } catch(e) {}
  try {
    const pu = auditPremiumScreenshotUxFixes();
    trackerAllHistoryClean = !!pu.trackerShowsAllMetricLogs;
    premiumScreenshotUxClean = Object.values(pu).every(Boolean);
  } catch(e) {}
  try {
    const vt = auditVisibleMyPlanLogText();
    visibleMyPlanTextClean = Object.values(vt).every(Boolean);
  } catch(e) {}
  let dayStreakCalculationClean = false;
  try {
    const ds = auditDayStreakCalculation();
    dayStreakCalculationClean = !!(ds.helperExists && ds.emptyMetricsReturnsZero &&
      ds.singleDayReturnsOne && ds.consecutiveFiveDaysReturnsFive &&
      ds.gapStopsAtLatestRun && ds.unorderedDatesHandled &&
      ds.duplicateDatesHandled && ds.latestDateAnchorUsed);
  } catch(e) {}
  const result = {
    myPlanTextQualityClean,
    myPlanUnitFormattingClean,
    myPlanDetailMappingClean,
    trackerAllHistoryClean,
    premiumScreenshotUxClean,
    visibleMyPlanTextClean,
    dayStreakCalculationClean,
    allCoreAuditsAvailable
  };
  console.table(result);
  return result;
}
window.auditFinalScreenshotReadiness = auditFinalScreenshotReadiness;

// ==================== MY PLAN LOG UNIT FORMATTING AUDIT ====================

function auditMyPlanLogUnitFormatting() {
  const html = document.documentElement.innerHTML;
  const targetDoesNotAppendRepsToTime          = typeof _mpIsTimeBasedExercise === 'function' && html.includes('_mpFormatRepsLabel') && html.includes('isTimeBased');
  const resultDoesNotAppendWeightToTimeBasedExercises = html.includes('if (!isTimeBased)') && html.includes('_mpFormatDisplayWeight');
  const noUnitWithoutNumericWeight             = html.includes('!Number.isFinite(n) || n <= 0') && html.includes('return \'\'');
  const convertsLoggedWeightToCurrentUnit      = html.includes('_mpFormatDisplayWeight') && html.includes('sourceUnit') && html.includes('targetUnit');
  const meaningfulValueGuardExists             = typeof _mpIsMeaningfulValue === 'function';
  const timeBasedExerciseDetectorExists        = typeof _mpIsTimeBasedExercise === 'function';
  const resultFormatterReceivesPlannedContext  = html.includes('_mpFormatResult(logged, weightUnit, planned)');
  const singularSetFormattingExists            = typeof _mpFormatSetWord === 'function';
  const avoidsRestZeroDisplay                  = html.includes('Number(rest) > 0');
  const result = {
    targetDoesNotAppendRepsToTime,
    resultDoesNotAppendWeightToTimeBasedExercises,
    noUnitWithoutNumericWeight,
    convertsLoggedWeightToCurrentUnit,
    meaningfulValueGuardExists,
    timeBasedExerciseDetectorExists,
    resultFormatterReceivesPlannedContext,
    singularSetFormattingExists,
    avoidsRestZeroDisplay
  };
  console.table(result);
  return result;
}
window.auditMyPlanLogUnitFormatting = auditMyPlanLogUnitFormatting;

// ==================== MY PLAN LOG TEXT QUALITY AUDIT ====================

function auditMyPlanLogTextQuality() {
  const cleanValueHelpersExist = typeof _mpCleanValue === 'function' && typeof _mpHasCleanValue === 'function';
  const numericRepRangeGetsReps = _mpFormatRepsLabel('15-20', false) === '15-20 reps' && _mpFormatRepsLabel('20', false) === '20 reps';
  const timeBasedDoesNotGetReps =
    _mpFormatRepsLabel('20 min', true) === '20 min' &&
    _mpFormatRepsLabel('30 sec', true) === '30 sec' &&
    _mpFormatRepsLabel('45 sec on/15 sec off', true) === '45 sec on/15 sec off';

  const skippedResult = _mpFormatResult(
    { completionStatus: 'skipped', actualSets: '', actualReps: '', actualWeight: '' },
    'lbs',
    { name: 'Face Pulls / Band Pull-Aparts', sets: 2, reps: '20 reps', rest: 30 }
  );
  const skippedDoesNotShowBrokenSets =
    !skippedResult.includes('sets ×') &&
    !skippedResult.includes('set ×') &&
    skippedResult.toLowerCase().includes('skip');

  const noBareUnitRisk =
    typeof _mpFormatDisplayWeight === 'function' &&
    _mpFormatDisplayWeight('', 'lbs', 'lbs') === '' &&
    _mpFormatDisplayWeight(null, 'lbs', 'lbs') === '';

  const noRestZeroRisk =
    !_mpFormatTarget({ name: 'Test', sets: 3, reps: 10, rest: 0 }, {}).includes('Rest 0s') &&
    !_mpFormatTarget({ name: 'Test', sets: 3, reps: 10, rest: null }, {}).includes('Rest null');

  const targetFallbackIsHumanReadable = _mpFormatTarget(null, null) === 'Target not specified';
  const resultFallbackIsHumanReadable = _mpFormatResult(null, 'lbs', null) === 'Not logged';

  const targetResult = _mpFormatTarget({ name: 'Ab Crunches', sets: 3, reps: '15-20', rest: 30 }, {});
  const completeResult = _mpFormatResult(
    { completionStatus: 'complete', actualSets: 3, actualReps: 20, actualWeight: '' },
    'lbs',
    { name: 'Ab Crunches', sets: 3, reps: '15-20', rest: 30 }
  );
  const abCrunchesStyleRepsHandled = targetResult.includes('15-20 reps') && completeResult.includes('20 reps');
  const skippedStyleHandled = skippedDoesNotShowBrokenSets;

  const abCrunchesTargetShowsReps = targetResult.includes('15-20 reps');
  const abCrunchesLoggedResultShowsReps = completeResult.includes('20 reps');
  const contextAmountFormatterExists = typeof _mpFormatAmountWithContext === 'function';
  const plannedRepUnitDetectorExists = typeof _mpDetectPlannedRepUnit === 'function';

  const treadmillActualResult = _mpFormatResult(
    { completionStatus: 'partial', actualSets: 2, actualReps: 12, actualWeight: '' },
    'lbs',
    { name: 'Treadmill / Elliptical', sets: 1, reps: '20 min', rest: 0 }
  );
  const treadmillNumericActualInheritsMin = treadmillActualResult.includes('12 min') && !treadmillActualResult.includes('reps');

  const splitSquatActualResult = _mpFormatResult(
    { completionStatus: 'complete', actualSets: 3, actualReps: 10, actualWeight: 25, actualWeightUnit: 'lbs' },
    'lbs',
    { name: 'Split Squat', sets: 3, reps: '10 each leg', rest: 60 }
  );
  const splitSquatNumericActualInheritsEachLeg = splitSquatActualResult.includes('each leg');

  const result = {
    cleanValueHelpersExist,
    numericRepRangeGetsReps,
    timeBasedDoesNotGetReps,
    skippedDoesNotShowBrokenSets,
    noBareUnitRisk,
    noRestZeroRisk,
    targetFallbackIsHumanReadable,
    resultFallbackIsHumanReadable,
    abCrunchesStyleRepsHandled,
    skippedStyleHandled,
    abCrunchesTargetShowsReps,
    abCrunchesLoggedResultShowsReps,
    contextAmountFormatterExists,
    plannedRepUnitDetectorExists,
    treadmillNumericActualInheritsMin,
    splitSquatNumericActualInheritsEachLeg
  };
  console.table(result);
  return result;
}
window.auditMyPlanLogTextQuality = auditMyPlanLogTextQuality;

function auditVisibleMyPlanLogText() {
  const text = document.body.innerText || '';
  const noSetsTimesBrokenText = !/sets\s+×\s*\n/.test(text) && !/set\s+×\s*\n/.test(text);
  const noBareUnitText = !/^\s*(kg|lbs)\s*$/m.test(text);
  const noMinRepsText = !text.includes('min reps');
  const noSecRepsText = !text.includes('sec reps');
  let abCrunchesVisibleHasRepsOrNotVisible = true;
  if (text.includes('Ab Crunches') && /3 sets × 20/.test(text)) {
    abCrunchesVisibleHasRepsOrNotVisible = /3 sets × 20 reps/.test(text);
  }
  const result = {
    visibleTextChecked: true,
    noSetsTimesBrokenText,
    noBareUnitText,
    noMinRepsText,
    noSecRepsText,
    abCrunchesVisibleHasRepsOrNotVisible
  };
  console.table(result);
  return result;
}
window.auditVisibleMyPlanLogText = auditVisibleMyPlanLogText;
