<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VacationReady OS — Your Transformation Dashboard</title>
  <style>
    :root {
      --blue: #2C5F8D;
      --blue-light: #4A7FB5;
      --blue-pale: #EBF3FA;
      --coral: #E07B5A;
      --coral-pale: #FEF5F0;
      --green: #5A9E8F;
      --green-pale: #EFF6F5;
      --gold: #C49A5A;
      --gold-pale: #FDF6EE;
      --gray-900: #111827;
      --gray-700: #374151;
      --gray-500: #6B7280;
      --gray-300: #D1D5DB;
      --gray-100: #F3F4F6;
      --white: #FFFFFF;
      --bg: #F0F4F8;
      --border: #E5E7EB;
      --text-secondary: var(--gray-500);
      --radius: 12px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--gray-700);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Layout ---- */
    #app { min-height: 100vh; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .hidden { display: none !important; }

    /* ---- Onboarding ---- */
    #onboarding {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a3a5c 0%, #2C5F8D 60%, #1a4a6e 100%);
      /* Column flex + margin:auto on card = centered when content fits,
         top-aligned + scrollable when content exceeds viewport height */
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      z-index: 1000;
      padding: 16px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    .ob-card {
      background: var(--white);
      border-radius: 20px;
      width: 100%; max-width: 580px;
      padding: 40px;
      position: relative;
      /* margin:auto centers vertically when viewport has room;
         collapses to 0 when card overflows, letting scroll take over */
      margin-top: auto;
      margin-bottom: auto;
      flex-shrink: 0;
    }

    .ob-logo {
      text-align: center; margin-bottom: 8px;
      font-size: 13px; font-weight: 600;
      color: var(--blue); letter-spacing: 2px; text-transform: uppercase;
    }

    .ob-title {
      font-size: 26px; font-weight: 700;
      color: var(--gray-900); text-align: center; margin-bottom: 6px;
    }

    .ob-sub {
      text-align: center; color: var(--gray-500);
      font-size: 14px; margin-bottom: 28px;
    }

    .step-dots {
      display: flex; gap: 6px; justify-content: center; margin-bottom: 32px;
    }

    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gray-300); transition: all .2s;
    }

    .step-dot.active { background: var(--blue); width: 24px; border-radius: 4px; }
    .step-dot.done { background: var(--green); }

    .step-label {
      font-size: 11px; font-weight: 600; color: var(--blue);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
    }

    .step-heading {
      font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--gray-700); margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font);
      color: var(--gray-900); background: var(--white);
      transition: border-color .2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--blue); }

    .form-group textarea { resize: vertical; min-height: 72px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .option-group {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }

    .option-btn {
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      font-size: 13px; font-weight: 500;
      color: var(--gray-700); cursor: pointer;
      transition: all .15s; text-align: left;
    }

    .option-btn:hover { border-color: var(--blue-light); background: var(--blue-pale); }
    .option-btn.selected { border-color: var(--blue); background: var(--blue-pale); color: var(--blue); font-weight: 600; }

    .ob-actions {
      display: flex; gap: 10px; margin-top: 28px;
    }

    .btn {
      padding: 11px 22px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all .15s; display: inline-flex;
      align-items: center; gap: 6px;
    }

    .btn-primary {
      background: var(--blue); color: var(--white);
      flex: 1; justify-content: center;
    }

    .btn-primary:hover { background: var(--blue-light); }

    .btn-secondary {
      background: var(--gray-100); color: var(--gray-700); border: 1.5px solid var(--border);
    }

    .btn-secondary:hover { background: var(--gray-300); }

    .btn-danger { background: #DC2626; color: var(--white); }
    .btn-danger:hover { background: #B91C1C; }

    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .reality-box {
      background: var(--gold-pale);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius-sm);
      padding: 14px 16px; margin-top: 16px;
      font-size: 13px; color: var(--gray-700);
    }

    .reality-box strong { color: var(--gray-900); }

    /* ---- Header ---- */
    #app-header {
      background: var(--blue);
      color: var(--white);
      padding: 0 16px;
      position: sticky; top: 0; z-index: 100;
    }

    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between;
      height: 56px; gap: 16px;
    }

    .header-brand {
      font-size: 15px; font-weight: 700;
      letter-spacing: .5px; white-space: nowrap;
    }

    .header-brand span { opacity: .7; font-weight: 400; margin-left: 6px; font-size: 12px; }

    #countdown-display {
      background: rgba(255,255,255,.12);
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 600;
      white-space: nowrap;
    }

    #countdown-display .days { font-size: 18px; font-weight: 700; margin-right: 3px; }

    /* ---- Tabs ---- */
    #tab-nav {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky; top: 56px; z-index: 99;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }

    .tab-nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex;
    }

    .tab-btn {
      padding: 14px 18px;
      border: none; background: none;
      font-size: 13px; font-weight: 600;
      color: var(--gray-500); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all .15s;
    }

    .tab-btn:hover { color: var(--blue); }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ---- Tab Content ---- */
    .tab-pane { display: none; padding: 24px 16px 60px; }
    .tab-pane.active { display: block; }

    .tab-inner { max-width: 1100px; margin: 0 auto; }

    /* ---- Cards ---- */
    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card + .card { margin-top: 16px; }

    .card-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 15px; font-weight: 700;
      color: var(--gray-900);
    }

    .card-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .5px;
    }

    .badge-blue { background: var(--blue-pale); color: var(--blue); }
    .badge-green { background: var(--green-pale); color: var(--green); }
    .badge-coral { background: var(--coral-pale); color: var(--coral); }
    .badge-gold { background: var(--gold-pale); color: var(--gold); }

    /* ---- Dashboard Specific ---- */
    .event-banner {
      background: linear-gradient(135deg, var(--blue) 0%, #1a4a6e 100%);
      color: var(--white);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 16px;
    }

    .event-banner-top {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }

    .event-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .event-sub { font-size: 13px; opacity: .8; }

    .event-countdown {
      text-align: right;
    }

    .countdown-number { font-size: 48px; font-weight: 800; line-height: 1; }
    .countdown-label { font-size: 12px; opacity: .7; font-weight: 500; }

    .progress-section { margin-top: 20px; }

    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; font-weight: 600;
      opacity: .85; margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px; background: rgba(255,255,255,.2);
      border-radius: 3px; overflow: hidden;
    }

    .progress-fill {
      height: 100%; border-radius: 3px;
      background: rgba(255,255,255,.9);
      transition: width .4s ease;
    }

    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .stat-value { font-size: 24px; font-weight: 800; color: var(--gray-900); }
    .stat-label { font-size: 11px; color: var(--gray-500); font-weight: 600; margin-top: 2px; }

    /* ---- Progress Rings ---- */
    .rings-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .ring-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 10px 14px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }

    .ring-wrap {
      position: relative;
      width: 88px; height: 88px;
      flex-shrink: 0;
    }

    .ring-svg {
      width: 88px; height: 88px;
      transform: rotate(-90deg);
    }

    .ring-bg { fill: none; stroke: var(--gray-100); stroke-width: 8; }
    .ring-fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }

    .ring-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1px;
    }

    .ring-pct {
      font-size: 18px; font-weight: 800;
      line-height: 1; color: var(--gray-900);
    }

    .ring-sub {
      font-size: 10px; font-weight: 600;
      color: var(--gray-500); text-align: center;
      line-height: 1.2;
    }

    .ring-label {
      font-size: 11px; font-weight: 700;
      color: var(--gray-700); text-transform: uppercase;
      letter-spacing: .8px; text-align: center;
    }

    @media (max-width: 420px) {
      .rings-row { gap: 8px; }
      .ring-card { padding: 12px 6px 10px; }
      .ring-wrap { width: 76px; height: 76px; }
      .ring-svg { width: 76px; height: 76px; }
      .ring-pct { font-size: 16px; }
    }

    /* ---- Workout Cards ---- */
    .workout-list { display: flex; flex-direction: column; gap: 10px; }

    .workout-item {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden; background: var(--white);
      transition: border-color .2s;
    }

    .workout-item.completed { border-color: var(--green); }

    .workout-header {
      display: flex; align-items: center;
      padding: 14px 16px; gap: 12px; cursor: pointer;
    }

    .workout-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--gray-300);
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
      background: var(--white); transition: all .2s;
      cursor: pointer;
    }

    .workout-check.done { background: var(--green); border-color: var(--green); }
    .workout-check.done::after { content: ''; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translateY(-2px); display: block; }

    .workout-info { flex: 1; }
    .workout-day { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
    .workout-name { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-top: 1px; }
    .workout-meta { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

    .workout-expand-btn {
      font-size: 11px; font-weight: 600; color: var(--blue);
      background: var(--blue-pale); border: none;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
    }

    .workout-details {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
    }

    .workout-details.open { display: block; }

    .exercise-list { margin-bottom: 14px; }

    .exercise-item {
      display: flex; align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px; gap: 10px;
    }

    .exercise-item:last-child { border-bottom: none; }
    .exercise-name { font-weight: 600; color: var(--gray-900); flex: 1; }
    .exercise-detail { color: var(--gray-500); white-space: nowrap; }

    .log-form { margin-top: 14px; }

    .log-form .form-row { grid-template-columns: 1fr 1fr 1fr; }

    .log-form input, .log-form textarea, .log-form select {
      width: 100%; padding: 8px 12px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: var(--font); outline: none;
    }

    .log-form input:focus, .log-form textarea:focus { border-color: var(--blue); }

    .log-form label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 4px; }

    .log-form .form-group { margin-bottom: 10px; }

    .log-save-btn {
      margin-top: 12px; width: 100%;
      padding: 10px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700;
      background: var(--green); color: var(--white);
      border: none; cursor: pointer;
    }

    .log-save-btn:hover { opacity: .9; }

    .mindset-card {
      border-left: 4px solid var(--blue);
      padding-left: 16px;
    }

    .mindset-week-label { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .mindset-title { font-size: 17px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
    .mindset-text { font-size: 14px; color: var(--gray-700); line-height: 1.7; }

    /* ---- Plan Tab ---- */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .week-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      background: var(--white);
      cursor: pointer;
      transition: all .15s;
    }

    .week-card:hover { border-color: var(--blue-light); }
    .week-card.current-week { border-color: var(--blue); background: var(--blue-pale); }
    .week-card.completed-week { border-color: var(--green); background: var(--green-pale); }

    .week-num { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
    .week-phase { font-size: 14px; font-weight: 700; color: var(--gray-900); margin: 2px 0 6px; }
    .week-days { font-size: 12px; color: var(--gray-500); }
    .week-rpe { font-size: 11px; font-weight: 600; margin-top: 6px; }

    .phase-section { margin-bottom: 28px; }
    .phase-heading {
      font-size: 13px; font-weight: 700; color: var(--white);
      background: var(--blue); padding: 6px 14px;
      border-radius: 20px; display: inline-block; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: .5px;
    }

    .week-detail-card {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--white); padding: 20px; margin-top: 16px;
    }

    .week-workout-row {
      border-bottom: 1px solid var(--gray-100);
      padding: 12px 0;
    }

    .week-workout-row:last-child { border-bottom: none; }
    .week-workout-day { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; }
    .week-workout-name { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-top: 2px; }
    .week-workout-exercises { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

    /* ---- My Plan Log Detail ---- */
    .mp-view-btn { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; border: 1.5px solid var(--violet); color: var(--violet); background: transparent; cursor: pointer; white-space: nowrap; }
    .mp-view-btn:hover { background: var(--lavender-pale); }
    .mp-log-detail { display: none; margin-top: 10px; padding: 14px; background: var(--gray-100); border-radius: 10px; border: 1px solid var(--border); }
    .mp-log-detail.open { display: block; }
    .mp-log-meta { font-size: 12px; color: var(--gray-600); margin-bottom: 10px; line-height: 1.7; }
    .mp-log-meta strong { color: var(--gray-900); }
    .mp-log-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .mp-ex-table { width: 100%; min-width: 620px; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .mp-ex-table th { text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--gray-500); padding: 4px 6px; border-bottom: 1.5px solid var(--border); }
    .mp-ex-table td { padding: 6px 6px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
    .mp-ex-table tr:last-child td { border-bottom: none; }
    .mp-ex-name { font-weight: 700; color: var(--gray-900); }
    .mp-ex-target { color: var(--gray-500); font-size: 11px; }
    .mp-ex-result { color: var(--gray-900); font-weight: 600; }
    .mp-ex-note { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .mp-ex-sub { font-size: 11px; color: #7C3AED; margin-top: 2px; }
    @media (max-width: 600px) { .mp-log-detail { padding: 10px; } }
    .mp-badge { display: inline-block; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .mp-badge-green  { background: #D1FAE5; color: #065F46; }
    .mp-badge-amber  { background: #FEF3C7; color: #92400E; }
    .mp-badge-rose   { background: #FEE2E2; color: #991B1B; }
    .mp-badge-purple { background: #EDE9FE; color: #4C1D95; }
    .mp-badge-mint   { background: #ECFDF5; color: #064E3B; }
    .mp-badge-gray   { background: #F3F4F6; color: #6B7280; }

    /* ---- Tracker History Scroll ---- */
    .tracker-history-scroll { max-height: 420px; overflow-y: auto; overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .tracker-history-scroll thead th { position: sticky; top: 0; z-index: 1; background: var(--violet); }

    /* ---- Tracker Tab ---- */
    .tracker-sections { display: flex; flex-direction: column; gap: 16px; }

    .metric-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
    }

    .metric-input-group { display: flex; flex-direction: column; gap: 4px; }
    .metric-input-group label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
    .metric-input-group input {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 14px; outline: none; font-family: var(--font);
    }
    .metric-input-group input:focus { border-color: var(--blue); }

    .metric-log-entries { margin-top: 16px; }
    .metric-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
    }
    .metric-entry:last-child { border-bottom: none; }
    .metric-entry-date { color: var(--gray-500); }
    .metric-entry-values { font-weight: 600; color: var(--gray-900); }

    .placeholder-section {
      border: 2px dashed var(--gray-300);
      border-radius: var(--radius);
      padding: 28px 20px; text-align: center;
      color: var(--gray-500); background: var(--white);
    }

    .placeholder-section h3 { font-size: 15px; color: var(--gray-700); margin-bottom: 6px; }
    .placeholder-section p { font-size: 13px; }
    .placeholder-tag {
      display: inline-block; margin-bottom: 12px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 3px 10px; border-radius: 20px;
      background: var(--gold-pale); color: var(--gold);
      text-transform: uppercase;
    }

    /* ---- Guidance Tab ---- */
    .faq-list { display: flex; flex-direction: column; gap: 0; }

    .faq-item {
      border-bottom: 1px solid var(--gray-100);
      padding: 0;
    }

    .faq-question {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; cursor: pointer;
      font-size: 14px; font-weight: 600; color: var(--gray-900);
    }

    .faq-toggle { font-size: 18px; color: var(--gray-400); transition: transform .2s; }
    .faq-item.open .faq-toggle { transform: rotate(45deg); }

<style id="tracker-styles">
  /* === TRACKER PAGE HEADER === */
  .tracker-page-header {
    background: linear-gradient(135deg, var(--violet) 0%, var(--lavender-mid) 55%, #4A9ECC 100%);
    border-radius: var(--radius); padding: 28px 28px 22px;
    color: white; position: relative; overflow: hidden; margin-bottom: 16px;
  }
  .tracker-page-header::after {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,255,255,.08); pointer-events: none;
  }
  .tracker-header-title { font-size: 22px; font-weight: 900; margin-bottom: 5px; letter-spacing: -.3px; }
  .tracker-header-sub { font-size: 13px; opacity: .85; margin-bottom: 16px; line-height: 1.5; }
  .tracker-badge-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .tracker-badge {
    background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.25);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; font-weight: 700; letter-spacing: .2px;
  }

  /* === CHECK-IN FORM === */
  .checkin-section-label {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; margin: 18px 0 10px;
  }
  .checkin-section-label.cl-violet { color: var(--violet); }
  .checkin-section-label.cl-mint   { color: var(--mint); }
  .checkin-section-label.cl-peach  { color: var(--peach); }

  .checkin-body-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkin-input-group { display: flex; flex-direction: column; gap: 5px; }
  .checkin-input-group label { font-size: 12px; font-weight: 700; color: var(--gray-700); }
  .checkin-number-input {
    padding: 10px 14px; border: 2px solid var(--border);
    border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
    font-family: var(--font); color: var(--gray-900);
    transition: border-color .2s, box-shadow .2s; outline: none; width: 100%;
  }
  .checkin-number-input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(123,111,212,.12); }

  /* === RATING TILES === */
  .rating-section { display: flex; flex-direction: column; gap: 10px; }
  .rt-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .rt-label { font-size: 13px; font-weight: 700; color: var(--gray-700); min-width: 110px; }
  .rating-tiles { display: flex; gap: 6px; }
  .rating-tile {
    width: 40px; height: 40px; border: 2px solid var(--border);
    border-radius: 10px; background: var(--bg-card);
    font-size: 14px; font-weight: 800; color: var(--gray-400);
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .rating-tile:hover {
    border-color: var(--rt-color, var(--lavender));
    color: var(--rt-color, var(--lavender));
    background: var(--lavender-pale); transform: translateY(-2px);
  }
  .rating-tile.selected {
    background: var(--rt-color, var(--lavender));
    border-color: var(--rt-color, var(--lavender));
    color: white; box-shadow: 0 3px 8px rgba(0,0,0,.18);
    transform: translateY(-2px);
  }

  .checkin-textarea {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font);
    color: var(--gray-900); resize: vertical; min-height: 76px;
    transition: border-color .2s, box-shadow .2s; outline: none; line-height: 1.6;
  }
  .checkin-textarea:focus { border-color: var(--peach); box-shadow: 0 0 0 3px rgba(224,122,80,.1); }
  .checkin-save-btn { width: 100%; margin-top: 18px; padding: 13px; font-size: 14px; font-weight: 800; justify-content: center; }

  /* === SNAPSHOT === */
  .snapshot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .snapshot-tile {
    border-radius: var(--radius-sm); padding: 14px 10px; text-align: center;
    background: var(--bg-card); border: 1.5px solid var(--border);
    box-shadow: var(--shadow-sm); border-top: 3px solid var(--st-color, var(--lavender));
    transition: transform .15s, box-shadow .15s;
  }
  .snapshot-tile:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .snapshot-icon { font-size: 20px; margin-bottom: 6px; }
  .snapshot-val { font-size: 21px; font-weight: 900; color: var(--st-color, var(--violet)); line-height: 1.1; }
  .snapshot-key { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; color: var(--gray-500); margin-top: 4px; }

  /* === LOG TABLE === */
  .tracker-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-sm); }
  .tracker-log-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
  .tracker-log-table thead tr { background: linear-gradient(135deg, var(--violet), var(--lavender-mid)); }
  .tracker-log-table th {
    padding: 10px 12px; text-align: left;
    font-size: 10px; font-weight: 800; letter-spacing: .8px;
    text-transform: uppercase; color: white;
  }
  .tracker-log-table th:first-child { border-radius: 8px 0 0 0; }
  .tracker-log-table th:last-child  { border-radius: 0 8px 0 0; }
  .tr-even { background: var(--bg-card); }
  .tr-odd  { background: var(--gray-100); }
  .tracker-log-table td { padding: 9px 12px; color: var(--gray-900); font-weight: 600; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .log-td-date { color: var(--gray-500); font-size: 11px; white-space: nowrap; font-weight: 700; }
  .log-td-notes { color: var(--gray-600); font-size: 12px; max-width: 140px; font-weight: 400; }
  .td-rating { font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .td-empty { color: var(--gray-300); font-weight: 400; }

  /* === PHOTO FEATURE CARD === */
  .photo-feature-card {
    background: linear-gradient(135deg, #1A1240 0%, #2E1F72 50%, #1A2E60 100%);
    border-radius: var(--radius); padding: 28px 24px;
    color: white; position: relative; overflow: hidden;
  }
  .photo-feature-card::before {
    content: ''; position: absolute; top: -50px; right: -50px;
    width: 220px; height: 220px; border-radius: 50%;
    background: rgba(123,111,212,.14); pointer-events: none;
  }
  .photo-feature-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 16px; margin-bottom: 20px;
  }
  .photo-feature-icon { font-size: 48px; opacity: .55; flex-shrink: 0; line-height: 1; }
  .photo-feature-badge {
    display: inline-block; margin-bottom: 10px;
    font-size: 10px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 20px;
    background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.2);
  }
  .photo-feature-title { font-size: 20px; font-weight: 900; margin-bottom: 8px; letter-spacing: -.2px; }
  .photo-feature-sub { font-size: 13px; opacity: .78; line-height: 1.6; }
  .photo-feature-bullets { display: flex; flex-direction: column; gap: 10px; border-top: 1px solid rgba(255,255,255,.1); padding-top: 18px; }
  .photo-feature-bullet { display: flex; align-items: center; gap: 10px; font-size: 13px; opacity: .88; }
  .photo-bullet-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    .tracker-page-header { padding: 20px 16px 18px; }
    .tracker-header-title { font-size: 18px; }
    .rt-label { min-width: 84px; font-size: 12px; }
    .rating-tile { width: 34px; height: 34px; font-size: 13px; }
    .photo-feature-top { flex-direction: column-reverse; }
    .photo-feature-icon { font-size: 36px; }
    .checkin-body-row { grid-template-columns: 1fr; }
  }
</style>

  /* BODY SNAPSHOT */

  .db-snap-tile:hover { transform:translateY(-2px); }
  .db-snap-icon { font-size:18px; margin-bottom:4px; }
  .db-snap-val { font-size:18px; font-weight:900; line-height:1.1; }
  .db-snap-unit { font-size:11px; font-weight:600; }

  /* MISSION LIST */
  .db-mission-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .db-mission-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--bg-card); transition:all .15s; }
  .db-mission-row:hover { border-color:var(--lavender); box-shadow:var(--shadow-sm); }
  .db-mission-row.mission-done { border-color:var(--mint); background:var(--mint-pale); opacity:.8; }
  .db-mcheck { width:22px; height:22px; border-radius:50%; border:2px solid var(--gray-300); flex-shrink:0; cursor:pointer; transition:all .2s; position:relative; }
  .db-mcheck.mcheck-done { background:var(--mint); border-color:var(--mint); }
  .db-mcheck.mcheck-done::after { content:''; position:absolute; left:5px; top:2px; width:6px; height:10px; border:2px solid white; border-top:none; border-left:none; transform:rotate(45deg); }
  .db-miss-info { flex:1; }
  .db-miss-name { font-size:13px; font-weight:700; color:var(--gray-900); }
  .db-miss-meta { font-size:11px; color:var(--gray-500); margin-top:2px; }
  .db-log-btn { font-size:11px; font-weight:800; padding:5px 12px; border-radius:20px; border:none; background:var(--lavender-pale); color:var(--violet); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .db-log-btn:hover { background:var(--violet); color:white; }
  .db-done-badge { font-size:11px; font-weight:800; color:var(--mint); white-space:nowrap; }

  /* QUICK ACTIONS */
  .db-actions { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .db-act-btn { padding:14px 8px; border:none; border-radius:var(--radius-sm); background:var(--ab-color,var(--violet)); color:white; font-size:12px; font-weight:800; cursor:pointer; transition:all .15s; text-align:center; line-height:1.4; box-shadow:0 3px 10px rgba(0,0,0,.12); }
  .db-act-btn:hover { opacity:.9; transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.18); }

  /* EMPTY STATE */
  .db-empty { text-align:center; padding:20px 12px; color:var(--gray-500); font-size:13px; font-style:italic; line-height:1.6; }

  /* RESPONSIVE */
  @media (max-width:720px) {
    .db-rings-row { justify-content:center; gap:20px; }
    .db-ring { width:90px; height:90px; }
    .db-ring::after { inset:14px; }
    .db-ring-val { font-size:18px; }
    .db-two-col { grid-template-columns:1fr; }
    .db-actions { grid-template-columns:1fr 1fr; }

    .db-ring::after { inset:12px; }
    .db-ring-val { font-size:16px; }

</style>
<style id="workout-logging-styles">
  /* ---- Exercise-level log rows ---- */
  .ex-log-table { margin-bottom: 12px; border: 1.5px solid var(--gray-100); border-radius: 10px; overflow: hidden; }

  .ex-log-row { border-bottom: 1px solid var(--gray-100); transition: background .2s; }
  .ex-log-row:last-child { border-bottom: none; }

  /* Row background tints by status */
  .ex-log-row[data-status="done"]        { background: #F0FDF4; }
  .ex-log-row[data-status="partial"]     { background: #FFFBEB; }
  .ex-log-row[data-status="skipped"]     { background: #FFF1F2; }
  .ex-log-row[data-status="substituted"] { background: #F5F3FF; }
  .ex-log-row[data-status="extra"]       { background: #FFF7ED; }
  .ex-log-row[data-status=""]            { background: #FAFAFA; }

  .ex-log-head { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 10px 14px 6px; }
  .ex-log-name { font-size: 13px; font-weight: 700; color: var(--gray-900); flex: 1; min-width: 120px; }
  .ex-log-plan { font-size: 11px; color: var(--gray-500); white-space: nowrap; }

  .ex-log-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-left: auto; }

  .ex-status-pill {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600);
    cursor: pointer; transition: all .15s;
  }
  .ex-status-pill:hover { opacity: .8; }
  .ex-status-pill[data-pill$="-done"].sel        { background: var(--mint); border-color: var(--mint); color: white; }
  .ex-status-pill[data-pill$="-partial"].sel     { background: #F59E0B; border-color: #F59E0B; color: white; }
  .ex-status-pill[data-pill$="-skipped"].sel     { background: var(--rose); border-color: var(--rose); color: white; }
  .ex-status-pill[data-pill$="-substituted"].sel { background: var(--violet); border-color: var(--violet); color: white; }
  .ex-status-pill[data-pill$="-extra"].sel       { background: var(--peach); border-color: var(--peach); color: white; }

  .ex-log-fields {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    padding: 6px 14px 10px;
  }
  .ex-log-field label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px; }
  .ex-log-field input { width: 100%; padding: 5px 8px; border: 1.5px solid var(--gray-200); border-radius: 6px; font-size: 12px; font-family: var(--font); outline: none; box-sizing: border-box; }
  .ex-log-field input:focus { border-color: var(--violet); }
  .ex-log-field.ex-sub-field { grid-column: 1 / -1; }

  .ex-sub-wrap { padding: 0 14px 10px; }
  .ex-sub-wrap label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px; }
  .ex-sub-wrap input { width: 100%; padding: 5px 8px; border: 1.5px solid var(--violet); border-radius: 6px; font-size: 12px; font-family: var(--font); outline: none; box-sizing: border-box; background: #F5F3FF; }

  .ex-score-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; background: var(--gray-100); border-radius: 8px;
    margin: 0 0 10px; font-size: 13px;
  }
  .ex-score-label { font-weight: 600; color: var(--gray-700); }
  .ex-score-val { font-size: 18px; font-weight: 800; }

  @media (max-width:600px) {
    .ex-log-fields { grid-template-columns: 1fr 1fr; }
    .ex-log-head { gap: 6px; }
    .ex-log-pills { margin-left: 0; }
  }
</style>
<style id="mobile-layout-fix">
  /* ======================================================
     GLOBAL OVERFLOW PREVENTION
  ====================================================== */
  html, body { overflow-x: hidden; max-width: 100%; }
  #app { overflow-x: hidden; }
  .card, .workout-item, .tracker-section, .tracker-page-header,
  .ex-log-table, .ex-log-row, .ex-log-fields,
  .db-hero, .db-rings-row { max-width: 100%; box-sizing: border-box; min-width: 0; }

  /* Input safety net — prevents inputs from expanding their grid cells */
  .ex-log-field, .ex-sub-wrap,
  .ex-log-field input, .ex-sub-wrap input,
  .log-form input, .log-form textarea {
    min-width: 0; max-width: 100%; width: 100%; box-sizing: border-box;
  }

  /* ======================================================
     HEADER — MOBILE
  ====================================================== */
  @media (max-width: 600px) {
    /* Un-stick header on mobile so it doesn't eat vertical space;
       tab-nav becomes the sticky anchor at top:0 instead */
    #app-header { position: relative; top: auto; }
    #tab-nav    { position: sticky; top: 0; z-index: 100; }

    .header-inner {
      height: auto;
      flex-wrap: wrap;
      padding: 10px 0;
      gap: 6px;
    }

    .header-brand {
      font-size: 13px;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Subtitle span hidden on very small screens to avoid pushing pill */
    .header-brand span { display: none; }

    #countdown-display {
      font-size: 11px;
      padding: 4px 10px;
      white-space: normal;
      max-width: calc(100vw - 32px);
      word-break: break-word;
      flex-shrink: 1;
      min-width: 0;
    }

    #countdown-display .days { font-size: 14px; }
  }

  @media (max-width: 380px) {
    /* Stack brand + countdown on very narrow screens */
    .header-inner { flex-direction: column; align-items: flex-start; gap: 4px; }
    #countdown-display { width: 100%; max-width: 100%; }
  }

  /* ======================================================
     TAB NAV — MOBILE
  ====================================================== */
  @media (max-width: 600px) {
    /* Tab nav: intentional horizontal scroll, hidden scrollbar, fade hint */
    #tab-nav {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100vw;
      /* Hide scrollbar track — touch swipe still works */
      scrollbar-width: none;
      -ms-overflow-style: none;
      /* Right-edge fade signals more content — pure CSS, no layout effect */
      -webkit-mask-image: linear-gradient(to right, black calc(100% - 28px), transparent 100%);
      mask-image:         linear-gradient(to right, black calc(100% - 28px), transparent 100%);
    }
    #tab-nav::-webkit-scrollbar { display: none; }

    /* Inner strip is wider than viewport on purpose — let it scroll */
    .tab-nav-inner { width: max-content; min-width: 100%; }
    .tab-btn { padding: 11px 11px; font-size: 11px; }
  }

  /* ======================================================
     ONBOARDING — MOBILE VIEWPORT FIX
     Reduces internal spacing so card fits small screens.
     The flex-direction:column + margin:auto approach in the
     main style handles the scrollable centering; these rules
     trim excess whitespace on narrow phones.
  ====================================================== */
  @media (max-width: 600px) {
    /* Tighter card padding to maximise visible content area */
    .ob-card { padding: 20px 16px !important; }
    /* Tighter logo/title/sub area */
    .ob-logo { margin-bottom: 4px; }
    .ob-title { font-size: 19px !important; margin-bottom: 4px; }
    .ob-sub   { font-size: 12px !important; margin-bottom: 12px !important; }
    /* Compact progress dots */
    .step-dots { margin-bottom: 14px !important; }
    /* Compact section heading */
    .step-heading { font-size: 16px !important; margin-bottom: 10px !important; }
    /* Compact form rows */
    .ob-card .form-group { margin-bottom: 10px !important; }
    /* Compact action bar */
    .ob-actions { margin-top: 14px !important; }
    /* Option buttons: slightly smaller on very tight screens */
    .ob-card .option-btn { padding: 9px 10px; font-size: 12px; }
    /* Inputs slightly shorter */
    .ob-card .form-group input,
    .ob-card .form-group select,
    .ob-card .form-group textarea { padding: 9px 12px; font-size: 13px; }
    /* Reality/honesty box compact */
    .reality-box { padding: 10px 12px; font-size: 12px; margin-top: 10px; }
  }

  @media (max-width: 380px) {
    /* On very narrow phones give a little extra side breathing room */
    #onboarding { padding: 10px 10px; }
    .ob-card .btn { padding: 10px 14px; font-size: 13px; }
  }

  /* ======================================================
     DASHBOARD HERO — MOBILE
  ====================================================== */
  @media (max-width: 600px) {
    /* Core containment — hero must never exceed its parent */
    .db-hero {
      width: 100%; max-width: 100%; min-width: 0;
      padding: 18px 16px 16px;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* Hide the decorative circle on mobile — it is absolutely positioned
       and even with overflow:hidden it can inflate scrollWidth in some
       Blink/WebKit versions when right is negative */
    .db-hero::before { display: none; }

    /* Blanket containment for every hero descendant — catches any element
       that might have a computed min-width larger than the viewport */
    .db-hero * {
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    /* Flex layout */
    .db-hero-top {
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .db-hero-top > div { width: 100%; }

    /* Text scaling */
    .db-hero-event { font-size: 18px; word-break: break-word; }
    .db-hero-date  { font-size: 12px; word-break: break-word; }
    .db-hero-why   { font-size: 12px; word-break: break-word; }
    .db-hero-bar-row { font-size: 11px; width: 100%; }

    /* Badge pills */
    .db-hero-badges { gap: 6px; flex-wrap: wrap; width: 100%; }
    .db-status-badge, .db-focus-pill { font-size: 10px; padding: 3px 10px; }

    /* Days counter */
    .db-hero-right { text-align: left; }
    .db-days-big   { font-size: 38px; letter-spacing: -2px; }
    .db-days-lbl   { font-size: 11px; }

    /* Progress bar */
    .db-hero-track { width: 100%; }
  }

  /* ======================================================
     WORKOUT LOG — MOBILE
  ====================================================== */
  @media (max-width: 600px) {
    /* Head row wraps: name + plan on top, pills below */
    .ex-log-head {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 10px 12px 6px;
    }

    .ex-log-pills {
      margin-left: 0;
      width: 100%;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ex-status-pill { font-size: 10px; padding: 4px 8px; min-height: 30px; }

    /* Fields 2-col on normal mobile */
    .ex-log-fields {
      grid-template-columns: 1fr 1fr;
      padding: 6px 12px 10px;
      gap: 6px;
    }

    .ex-sub-wrap { padding: 0 12px 10px; }

    /* Score row */
    .ex-score-row { margin: 0 0 8px; font-size: 12px; }
    .ex-score-val  { font-size: 16px; }

    /* Log form fields */
    .log-form { padding: 0; }
    .log-form .form-row { grid-template-columns: 1fr; gap: 0; }
    .log-save-btn { font-size: 14px; padding: 13px; }
  }

  @media (max-width: 380px) {
    /* Fields 1-col on very narrow */
    .ex-log-fields { grid-template-columns: 1fr; }
    /* Tighten header padding */
    .ex-log-head { padding: 8px 10px 4px; }
    .ex-log-fields { padding: 4px 10px 8px; }
    .ex-sub-wrap { padding: 0 10px 8px; }
  }

  /* ======================================================
     GENERAL CARD + TAB PANE PADDING — MOBILE
  ====================================================== */
  @media (max-width: 600px) {
    .tab-pane { padding: 16px 12px 60px; }
    .card { padding: 16px; }
    .workout-details { padding: 12px; }
  }
</style>

function formatSmartNumber(value, decimals = 1) {
  const n = Number(value);
  if (!Number.isFinite(n)) return '';
  const rounded = Number(n.toFixed(decimals));
  return Number.isInteger(rounded) ? String(rounded) : String(rounded);
}

function today() { return new Date().toISOString().slice(0,10); }

function getDaysLeft(eventDate) {
  const now = new Date(); now.setHours(0,0,0,0);
  const ev = new Date(eventDate + 'T00:00:00');
  return Math.round((ev - now) / 86400000);
}

function getPhaseForWeek(w, totalWeeks) {
  const ratio = w / totalWeeks;
  if (ratio <= 2/12) return PHASES[0];
  if (ratio <= 4/12) return PHASES[1];
  if (ratio <= 6/12) return PHASES[2];
  if (ratio <= 8/12) return PHASES[3];
  if (ratio <= 10/12) return PHASES[4];
  return PHASES[5];
}

function getCurrentWeekNum(setupDate, totalWeeks) {
  const start = new Date(setupDate + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const daysDiff = Math.floor((now - start) / 86400000);
  const w = Math.floor(daysDiff / 7) + 1;
  return Math.min(Math.max(w, 1), totalWeeks);
}

function getProgressPct(setupDate, totalWeeks) {
  const w = getCurrentWeekNum(setupDate, totalWeeks);
  return Math.round(((w - 1) / totalWeeks) * 100);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

// Returns true if exercise name is allowed for the given equipment + fitness level context
function isExerciseAllowedForContext(exerciseName, equipmentKey, fitnessLevel) {
  if (!exerciseName) return true;
  const n = exerciseName.toLowerCase();
  const isBeginner = fitnessLevel === 'beginner';

  // Beginner risky exercises
  if (isBeginner) {
    const beginnerRisky = ['diamond push', 'ab wheel', 'pull-up', 'hanging knee', 'burpee', 'jump squat', 'plyometric'];
    if (beginnerRisky.some(r => n.includes(r))) return false;
  }

  if (equipmentKey === 'minimal') {
    const blockedMinimal = [
      'dumbbell', ' db ', 'db ', '(db)', 'db bicep', 'db row', 'db curl',
      'cable', 'machine', 'leg press', 'lat pulldown', 'bench press',
      'treadmill', 'elliptical', 'stationary bike', 'rope tricep',
      'resistance band', 'farmer carry', 'chest-supported row', 'barbell',
      'weighted curl', 'tricep pressdown', 'pull-ups / lat', 'pull-ups / assisted',
    ];
    if (blockedMinimal.some(b => n.includes(b))) return false;
    // Allow if it starts with "db" as a word (e.g., "DB Bicep Curl")
    if (/^db\b/.test(n)) return false;
  }

  if (equipmentKey === 'home') {
    const blockedHome = [
      'cable chest press', 'seated cable row', 'rope tricep', 'leg press',
      'lat pulldown', 'treadmill', 'elliptical', 'stationary bike',
      'smith machine', 'barbell squat', 'barbell bench', 'barbell row',
      'cable pull-through', 'cable pullover', 'cable crunch', 'pallof press',
      'cable curl', 'cable row / db row', 'resistance band', 'band pull-apart',
    ];
    if (blockedHome.some(b => n.includes(b))) return false;
  }

  return true;
}

function formatProfileWeight(value) {
  if (!value) return null;
  if (state.settings.weightUnit === 'kg') {
    return (value / 2.20462).toFixed(1) + ' kg';
  }
  return value + ' lbs';
}

function lbsToKg(v)  { return Math.round(v / 2.20462 * 10) / 10; }
function kgToLbs(v)  { return Math.round(v * 2.20462 * 10) / 10; }
function inToCm(v)   { return Math.round(v * 2.54    * 10) / 10; }
function cmToIn(v)   { return Math.round(v / 2.54    * 10) / 10; }
function roundSmart(v) { return Math.round(v * 10) / 10; }

function formatDisplayWeight(value, sourceUnit, targetUnit) {
  const n = parseFloat(value);
  if (isNaN(n) || n <= 0) return null;
  if (sourceUnit === targetUnit) return roundSmart(n);
  if (sourceUnit === 'lbs' && targetUnit === 'kg') return lbsToKg(n);
  if (sourceUnit === 'kg'  && targetUnit === 'lbs') return kgToLbs(n);
  return roundSmart(n);
}

function formatDisplayWaist(value, sourceUnit, targetUnit) {
  const n = parseFloat(value);
  if (isNaN(n) || n <= 0) return null;
  if (sourceUnit === targetUnit) return roundSmart(n);
  if (sourceUnit === 'in' && targetUnit === 'cm') return inToCm(n);
  if (sourceUnit === 'cm' && targetUnit === 'in') return cmToIn(n);
  return roundSmart(n);
}

function getLatestMetric() {
  return state.metrics.length ? state.metrics[state.metrics.length - 1] : null;
}

function getMetricTrend(metricKey) {
  const entries = state.metrics.filter(m => m[metricKey] != null);
  if (!entries.length) return null;
  const first  = entries[0][metricKey];
  const latest = entries[entries.length - 1][metricKey];
  const change = +(latest - first).toFixed(2);
  const direction = Math.abs(change) < 0.1 ? 'stable' : change > 0 ? 'up' : 'down';
  const last7 = entries.slice(-7).map(e => ({ date: e.date, value: e[metricKey] }));
  return { first, latest, change, direction, last7 };
}

function getWorkoutScore(l) {
  if (!l) return 0;
  if (typeof l.completionScore === 'number') return l.completionScore;
  if (l.completionStatus === 'complete') return 100;
  if (l.completionStatus === 'partial')  return 50;
  if (l.completionStatus === 'missed')   return 0;
  if (l.completed === true)              return 100;
  return 0;
}

function getWeekLogStats(weekData) {
  const weekLogs   = weekData.workouts.map(wo => state.log.find(l => l.workoutId === wo.id) ?? null);
  const planned    = weekData.workouts.length;
  const logged     = weekLogs.filter(l => l !== null).length;
  const complete   = weekLogs.filter(l => l?.completionStatus === 'complete' || (l?.completed && !l?.completionStatus)).length;
  const partial    = weekLogs.filter(l => l?.completionStatus === 'partial').length;
  const missed     = weekLogs.filter(l => l?.completionStatus === 'missed').length;
  const notStarted = weekLogs.filter(l => l === null).length;
  const effortPct  = planned > 0 ? Math.round(weekLogs.reduce((s, l) => s + getWorkoutScore(l), 0) / planned) : 0;
  return { planned, logged, complete, partial, missed, notStarted, effortPct };
}

function getWorkoutCompletionStats() {
  if (!state.plan || !state.user) return null;
  const currentWeek = getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks);
  const totalPlanned   = state.plan.weeks.reduce((s, w) => s + w.workouts.length, 0);
  const totalCompleted = state.log.filter(l => l.completed).length;
  const completionPct  = totalPlanned > 0 ? Math.round(totalCompleted / totalPlanned * 100) : 0;
  const pastWorkoutIds = state.plan.weeks.slice(0, currentWeek - 1).flatMap(w => w.workouts.map(wo => wo.id));
  const completedIds   = new Set(state.log.filter(l => l.completed).map(l => l.workoutId));
  const missed         = pastWorkoutIds.filter(id => !completedIds.has(id)).length;

  const weekWorkouts = state.plan.weeks[currentWeek - 1]?.workouts || [];
  const weekPlanned  = weekWorkouts.length;

  // Map each planned workout to its log entry (or null)
  const weekLogs = weekWorkouts.map(w => state.log.find(l => l.workoutId === w.id) ?? null);

  const weekLogged      = weekLogs.filter(l => l !== null).length;
  const weekCompleted   = weekLogs.filter(l => l?.completionStatus === 'complete' || (l?.completed && !l?.completionStatus)).length;
  const weekPartial     = weekLogs.filter(l => l?.completionStatus === 'partial').length;
  const weekMissed      = weekLogs.filter(l => l?.completionStatus === 'missed').length;
  const weekNotStarted  = weekLogs.filter(l => l === null).length;

  // Effort score: average score across all planned slots (0 for not-started, 100 for old completed-only logs)
  const effortSum     = weekLogs.reduce((s, l) => s + getWorkoutScore(l), 0);
  const weekEffortPct = weekPlanned > 0 ? Math.round(effortSum / weekPlanned) : 0;

  // Legacy field: keep weekPct as completed-only percentage for backward compat
  const weekPct = weekPlanned > 0 ? Math.round(weekCompleted / weekPlanned * 100) : 0;

  return {
    totalPlanned, totalCompleted, completionPct, missed,
    weekPlanned, weekCompleted, weekPct,
    weekLogged, weekPartial, weekMissed, weekNotStarted, weekEffortPct,
    weekLoggedPct: weekPlanned > 0 ? Math.round(weekLogged / weekPlanned * 100) : 0,
    weekCompletedPct: weekPct,
  };
}

function getWeeklyCalendarData() {
  if (!state.plan || !state.user) return [];
  const currentWeek = getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks);
  const weekData = state.plan.weeks[currentWeek - 1];
  if (!weekData) return [];

  const SLOT_DAYS = CHRONO_DAY_ORDER;
  const completedIds = new Set(
    state.log.filter(l => l.completed && weekData.workouts.some(w => w.id === l.workoutId))
             .map(l => l.workoutId)
  );
  const weekStart = new Date(state.user.setupDate + 'T00:00:00');
  weekStart.setDate(weekStart.getDate() + (currentWeek - 1) * 7);
  const todayStr = today();

  return SLOT_DAYS.map((dayName, i) => {
    const date    = new Date(weekStart.getTime() + i * 86400000);
    const dateStr = date.toISOString().slice(0, 10);
    const workout = weekData.workouts.find(w => w.day === dayName);
    const planned   = !!workout;
    const completed = workout ? completedIds.has(workout.id) : false;
    const isPast    = dateStr < todayStr;
    return {
      slot: i + 1, day: dayName, date: dateStr,
      isToday: dateStr === todayStr,
      planned, workoutName: workout?.name || null,
      completed, isRest: !planned,
      missed: planned && !completed && isPast,
    };
  });
}

function getMuscleGroupBalance() {
  if (!state.plan || !state.user) return null;
  const currentWeek = getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks);
  const weekData = state.plan.weeks[currentWeek - 1];
  if (!weekData) return null;

  const counts = { upper: 0, lower: 0, core: 0, cardio: 0, fullBody: 0 };
  const classify = name => {
    const n = name.toLowerCase();
    if (/treadmill|hiit|cardio|elliptic|bike|burpee|high knee|jumping|sprint|finisher/.test(n)) return 'cardio';
    if (/plank|crunch|\bab\b|core|twist|mountain climber|leg raise|sit.up/.test(n))            return 'core';
    if (/squat|lunge|deadlift|\bleg\b|hamstring|quad|glute|calf|\bhip\b|step.up/.test(n))      return 'lower';
    if (/push|bench|press|pull|row|curl|shoulder|chest|back|tricep|bicep|lat|fly|raise|dip/.test(n)) return 'upper';
    return 'fullBody';
  };

  weekData.workouts.forEach(workout => {
    const wCat = classify(workout.name);
    if (wCat !== 'fullBody') {
      counts[wCat]++;
    } else {
      workout.exercises.forEach(ex => { counts[classify(ex.name)]++; });
    }
  });

  const total = Object.values(counts).reduce((s, v) => s + v, 0) || 1;
  return Object.fromEntries(Object.entries(counts).map(([k, v]) => [k, Math.round(v / total * 100)]));
}

function getReadinessScore() {
  const recent = state.metrics.slice(-3);
  if (!recent.length) return { score: null, label: 'No data' };
  const avg = key => {
    const vals = recent.map(m => m[key]).filter(v => v != null);
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  const energy = avg('energy'), sleep = avg('sleep'), soreness = avg('soreness');
  if (energy == null && sleep == null && soreness == null) return { score: null, label: 'No data' };
  let score = 50;
  if (energy   != null) score += (energy   - 3) * 10;
  if (sleep    != null) score += (sleep    - 3) * 10;
  if (soreness != null) score -= (soreness - 3) * 8;
  score = Math.min(100, Math.max(0, Math.round(score)));
  const label = score >= 80 ? 'Excellent' : score >= 60 ? 'Strong' : score >= 40 ? 'Okay' : 'Low';
  return { score, label };
}

function getOverallPlanEffortPct() {
  if (!state.plan) return 0;
  const allWorkouts = state.plan.weeks.flatMap(w => w.workouts);
  const totalPlanned = allWorkouts.length;
  if (totalPlanned === 0) return 0;
  const totalScore = allWorkouts.reduce((sum, wo) => {
    const logEntry = state.log.find(l => l.workoutId === wo.id) ?? null;
    return sum + getWorkoutScore(logEntry);
  }, 0);
  return Math.round(totalScore / (totalPlanned * 100) * 100);
}

function getDashboardSummary() {
  if (!state.user || !state.plan) return null;
  const currentWeek = getCurrentWeekNum(state.user.setupDate, state.plan.totalWeeks);
  return {
    daysLeft:           getDaysLeft(state.user.eventDate),
    currentWeek,
    totalWeeks:         state.plan.totalWeeks,
    planProgress:       getProgressPct(state.user.setupDate, state.plan.totalWeeks),
    planEffortPct:      getOverallPlanEffortPct(),
    workoutStats:       getWorkoutCompletionStats(),
    latestMetric:       getLatestMetric(),
    metricTrends: {
      weight:   getMetricTrend('weight'),
      waist:    getMetricTrend('waist'),
      energy:   getMetricTrend('energy'),
      sleep:    getMetricTrend('sleep'),
      soreness: getMetricTrend('soreness'),
    },
    weeklyCalendar:     getWeeklyCalendarData(),
    muscleGroupBalance: getMuscleGroupBalance(),
    readinessScore:     getReadinessScore(),
    streak:             calcStreak(),
    focus:              state.user.focus,
    motivation:         state.user.why,
  };
}

// ==================== PLAN GENERATION ====================

function getDaysCountForUser(phase, level, hours) {
  const base = phase.daysPerWeek[level] || 3;
  const isTaper = phase.name === 'Taper & Confidence';
  if (hours === '3-5') {
    if (level === 'beginner')     return Math.min(base, 3);
    if (level === 'intermediate') return Math.min(base, 3);
    // advanced: lighter than 5-8 baseline
    return isTaper ? base : Math.min(base, 3);
  }
  if (hours === '8+') {
    if (isTaper) return base;
    if (level === 'beginner') return Math.min(base, 3);
    if (level === 'intermediate') return Math.min(base + 1, 4);
    const isPeakOrDef = phase.name === 'Peak Effort' || phase.name === 'Definition';
    return isPeakOrDef ? Math.min(base + 1, 5) : Math.min(base + 1, 4);
  }
  // 5-8 hrs/week: use baseline, but cap advanced at 4 to preserve 8+ distinction
  if (level === 'advanced') return Math.min(base, 4);
  return base;
}

function generatePlan(user) {
  const daysLeft = getDaysLeft(user.eventDate);
  let totalWeeks;
  if (daysLeft <= 63) totalWeeks = 8;
  else if (daysLeft <= 77) totalWeeks = 10;
  else totalWeeks = 12;

  const level = user.fitnessLevel;
  const eq = normalizeEquipmentKey(user.equipment);
  // For template lookup: hybrid uses gym structure, minimal has its own template
  const templateKey = eq === 'hybrid' ? 'gym' : (eq === 'minimal' ? 'minimal' : (eq === 'home' ? 'home' : 'gym'));
  const template = WORKOUT_TEMPLATES[templateKey] || WORKOUT_TEMPLATES.gym;
  const levelTemplate = template[level] || template.intermediate;

  const weeks = [];
  for (let w = 1; w <= totalWeeks; w++) {
    const phase = getPhaseForWeek(w, totalWeeks);
    const daysCount = getDaysCountForUser(phase, level, user.hours);
    const narrative = getWeekMindsetCopy(w, phase.name, daysCount, user.focus, user.fitnessLevel);
    const workouts = buildWeekWorkouts(w, daysCount, level, levelTemplate, user.focus, phase, eq);

    weeks.push({
      weekNum: w,
      phaseName: phase.name,
      phaseColor: phase.color,
      rpe: phase.rpe,
      narrative,
      workouts,
    });
  }

  return {
    totalWeeks,
    setupDate: today(),
    generatedDate: today(),
    weeks,
  };
}

function applyExerciseVariety(exercises, weekNum, eq) {
  let pools, roleMap;
  if (eq === 'minimal') {
    pools = MINIMAL_VARIETY_POOLS;
    roleMap = MINIMAL_EXERCISE_ROLE;
  } else if (eq === 'home') {
    pools = HOME_VARIETY_POOLS;
    roleMap = HOME_EXERCISE_ROLE;
  } else if (eq === 'hybrid') {
    // Alternate between home and gym pools each week so hybrid feels different from pure gym
    pools = weekNum % 2 === 0 ? HOME_VARIETY_POOLS : GYM_VARIETY_POOLS;
    roleMap = weekNum % 2 === 0 ? HOME_EXERCISE_ROLE : GYM_EXERCISE_ROLE;
  } else {
    pools = GYM_VARIETY_POOLS;
    roleMap = GYM_EXERCISE_ROLE;
  }
  const maxSwaps = weekNum <= 2 ? 1 : 2;
  let swaps = 0;
  return exercises.map(ex => {
    if (swaps >= maxSwaps) return ex;
    const role = roleMap[ex.name];
    if (!role || !pools[role]) return ex;
    const pool = pools[role];
    const picked = pool[(weekNum - 1) % pool.length];
    if (picked.name !== ex.name) { swaps++; return { ...picked }; }
    return ex;
  });
}

function getVarietyWorkoutName(phaseName, key) {
  const map = PHASE_WORKOUT_NAMES[phaseName];
  return (map && map[key]) || null;
}

function buildFifthDayWorkout(weekNum, level, focus, phase, eqKey, existingNames) {
  const DAYS = ['Monday', 'Wednesday', 'Friday', 'Saturday', 'Tuesday', 'Thursday', 'Sunday'];
  const pool = (FIFTH_DAY_POOLS[eqKey] || FIFTH_DAY_POOLS.gym)
    .filter(e => isExerciseAllowedForContext(e.name, eqKey, level) && !existingNames.has(e.name));

  // Deterministic selection based on weekNum
  const exercises = [];
  const used = new Set();
  for (let i = 0; i < pool.length && exercises.length < 4; i++) {
    const ex = pool[(weekNum - 1 + i) % pool.length];
    if (!used.has(ex.name)) { exercises.push(ex); used.add(ex.name); }
  }

  const workoutName = getVarietyWorkoutName(phase.name, 'accessory') || 'Athletic Finish';
  return {
    id: `w${weekNum}_${DAYS[4].toLowerCase()}`,
    day: DAYS[4],
    name: workoutName,
    exercises: dedupeWorkoutExercises(exercises, eqKey, normalizeFocusKey(focus), level),
    duration: estimateDuration(exercises),
    rpe: phase.rpe,
  };
}

const CHRONO_DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function sortWorkoutsByChronologicalDay(workouts) {
  return workouts.slice().sort((a, b) => {
    const ai = CHRONO_DAY_ORDER.indexOf(a.day);
    const bi = CHRONO_DAY_ORDER.indexOf(b.day);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
}

function buildWeekWorkouts(weekNum, daysCount, level, levelTemplate, focus, phase, eq) {
  const DAYS = ['Monday', 'Wednesday', 'Friday', 'Saturday', 'Tuesday', 'Thursday', 'Sunday'];
  const eqKey = eq || 'gym';
  const workouts = [];

  const buildWorkout = (key, t, dayIndex) => {
    // Filter base exercises for equipment + fitness level
    const safeBase = t.exercises.filter(e => isExerciseAllowedForContext(e.name, eqKey, level));
    const baseExercises = augmentForFocus(safeBase, focus, level, weekNum, eqKey, dayIndex);
    const finalExercises = applyExerciseVariety(baseExercises, weekNum, eqKey);
    // Final safety pass: filter and dedupe
    const cleanExercises = dedupeWorkoutExercises(
      finalExercises.filter(e => isExerciseAllowedForContext(e.name, eqKey, level)),
      eqKey, normalizeFocusKey(focus), level
    );
    return {
      id: `w${weekNum}_${DAYS[dayIndex].toLowerCase()}`,
      day: DAYS[dayIndex],
      name: getVarietyWorkoutName(phase.name, key) || t.name,
      exercises: cleanExercises,
      duration: estimateDuration(cleanExercises),
      rpe: phase.rpe,
    };
  };

  if (level === 'beginner') {
    const rotation = ['A', 'B', 'C'];
    for (let i = 0; i < Math.min(daysCount, 3); i++) {
      const key = rotation[i % 3];
      const t = levelTemplate[key];
      if (!t) continue;
      workouts.push(buildWorkout(key, t, i));
    }
  } else {
    const schedule = daysCount >= 4
      ? ['push', 'lower', 'pull', 'cardio']
      : ['push', 'lower', 'pull'];
    for (let i = 0; i < Math.min(daysCount, schedule.length); i++) {
      const key = schedule[i];
      const t = levelTemplate[key];
      if (!t) continue;
      workouts.push(buildWorkout(key, t, i));
    }
    if (daysCount >= 5 && workouts.length >= 4) {
      const existingNames = new Set(workouts.flatMap(wo => wo.exercises.map(e => e.name)));
      workouts.push(buildFifthDayWorkout(weekNum, level, focus, phase, eqKey, existingNames));
    }
  }

  return sortWorkoutsByChronologicalDay(workouts);
}

function dedupeWorkoutExercises(exercises, eqKey, focusKey, level) {
  const seen = new Set();
  const result = [];
  for (const ex of exercises) {
    if (!seen.has(ex.name)) {
      seen.add(ex.name);
      result.push(ex);
    }
    // silently drop exact duplicate exercise names
  }
  return result;
}

function augmentForFocus(exercises, focus, level, weekNum, eq, workoutIndex) {
  const fk = normalizeFocusKey(focus);
  if (!fk) return dedupeWorkoutExercises([...exercises], eq, null, level);

  const isBeginner = level === 'beginner';
  const eqKey = eq || 'gym';
  const wk = weekNum || 1;
  const wIdx = workoutIndex || 0;

  // Select the correct equipment-aware pool; fall back to gym pool
  const focusByEq = FOCUS_POOLS_BY_EQ[fk] || {};
  let pool = [...(focusByEq[eqKey] || focusByEq['gym'] || [])];

  // Beginner safety: remove any risky movements from pool
  if (isBeginner) {
    const beginnerRisky = ['hanging knee', 'ab wheel', 'pull-up', 'jump squat', 'burpee', 'diamond push'];
    pool = pool.filter(e => !beginnerRisky.some(r => e.name.toLowerCase().includes(r)));
  }

  // Build set of existing exercise names to avoid duplicates
  const existingNames = new Set(exercises.map(e => e.name.toLowerCase()));

  // Filter pool to avoid exact duplicates with existing exercises
  const availablePool = pool.filter(e => !existingNames.has(e.name.toLowerCase()));

  if (!availablePool.length) return dedupeWorkoutExercises([...exercises], eq, fk, level);

  // Rotate focus pick: wk shifts the start position across weeks; wIdx picks different items per workout
  const weekSeed = wk % availablePool.length;
  const idx1 = (weekSeed + wIdx) % availablePool.length;

  // Avoid within-week duplicates: if an earlier workout in this week would get the same pool slot, skip
  let skipPick1 = false;
  for (let prev = 0; prev < wIdx; prev++) {
    if ((weekSeed + prev) % availablePool.length === idx1) { skipPick1 = true; break; }
  }
  if (skipPick1) return dedupeWorkoutExercises([...exercises], eq, fk, level);

  const pick1 = availablePool[idx1];

  const addSecond = !isBeginner && wk % 2 === 0 && availablePool.length >= 3;
  const idx2 = (weekSeed + wIdx + Math.ceil(availablePool.length / 2)) % availablePool.length;
  const pick2 = (addSecond && idx2 !== idx1) ? availablePool[idx2] : null;

  const augmented = [...exercises, pick1, ...(pick2 ? [pick2] : [])];
  return dedupeWorkoutExercises(augmented, eq, fk, level);
}

function estimateDuration(exercises) {
  return exercises.reduce((sum, ex) => {
    return sum + ex.sets * (ex.rest / 60 + 1.5);
  }, 5); // 5 min warmup
}

function loadState() {
  state.user = S.get(S.keys.user);
  state.plan = S.get(S.keys.plan);
  state.log = S.get(S.keys.log) || [];
  state.metrics = S.get(S.keys.metrics) || [];
  state.settings = S.get(S.keys.settings) || { weightUnit: 'lbs' };
  if (!state.settings.measurementUnit) state.settings.measurementUnit = 'in';
  runUnitMigration();
  upgradeWorkoutVarietyV1();
  normalizeLegacyLogs();
}

function saveUser() { S.set(S.keys.user, state.user); }
function savePlan() { S.set(S.keys.plan, state.plan); }
function saveLog() { S.set(S.keys.log, state.log); }
function saveMetrics() { S.set(S.keys.metrics, state.metrics); }
function saveSettings() { S.set(S.keys.settings, state.settings); }

function normalizeLegacyLogs() {
  let changed = false;
  state.log.forEach(l => {
    // Derive score from existing fields when missing
    const hasStatus = typeof l.completionStatus === 'string';
    const hasScore  = typeof l.completionScore  === 'number';

    if (l.completed === true && !hasStatus) {
      l.completionStatus = 'complete';
      changed = true;
    }
    if (l.completionStatus === 'complete' && !hasScore) {
      l.completionScore = 100;
      l.completed = true;
      changed = true;
    }
    if (l.completed === true && !hasScore) {
      l.completionScore = 100;
      changed = true;
    }
    if (l.completionStatus === 'partial' && !hasScore) {
      l.completionScore = 50;
      l.completed = false;
      changed = true;
    }
    if (hasScore && !hasStatus) {
      if (l.completionScore >= 100) {
        l.completionStatus = 'complete';
        l.completed = true;
      } else if (l.completionScore > 0) {
        l.completionStatus = 'partial';
        l.completed = false;
      } else {
        l.completionStatus = 'missed';
        l.completed = false;
      }
      changed = true;
    }
  });
  if (changed) saveLog();
}

function runUnitMigration() {
  if (localStorage.getItem('vr_unit_migration_v1')) return;
  const wUnit = state.settings.weightUnit || 'lbs';
  state.log.forEach(l => {
    (l.exerciseLogs || []).forEach(ex => {
      if (ex.actualWeight && !ex.actualWeightUnit) ex.actualWeightUnit = wUnit;
    });
  });
  state.metrics.forEach(m => {
    if (m.weight != null && !m.weightUnit) m.weightUnit = wUnit;
    if (m.waist  != null && !m.waistUnit)  m.waistUnit  = 'in';
  });
  saveLog(); saveMetrics();
  localStorage.setItem('vr_unit_migration_v1', '1');
}

function upgradeWorkoutVarietyV1() {
  if (localStorage.getItem('vr_workout_variety_v1')) return;
  if (!state.plan || !state.user) {
    localStorage.setItem('vr_workout_variety_v1', '1');
    return;
  }
  const loggedIds = new Set(state.log.map(l => l.workoutId));
  const oldById = {};
  state.plan.weeks.forEach(w => w.workouts.forEach(wo => { oldById[wo.id] = wo; }));
  const newPlan = generatePlan(state.user);
  newPlan.weeks.forEach(week => {
    week.workouts = week.workouts.map(wo => {
      if (loggedIds.has(wo.id) && oldById[wo.id]) return oldById[wo.id];
      return wo;
    });
  });
  state.plan = newPlan;
  savePlan();
  localStorage.setItem('vr_workout_variety_v1', '1');
}

    document.getElementById('ob-title').textContent = 'Your Plan is Ready';
    document.getElementById('ob-sub').textContent = 'Here\'s what we\'ve built for you.';
    html = `
      <div class="step-label">Step 5 of 5 — Preview</div>
      <div class="step-heading">Your ${weeks}-Week Plan</div>
      <div class="card" style="margin-bottom:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">EVENT</div>${eventTypeLabel(d.eventType)}</div>
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">DATE</div>${formatDate(d.eventDate)}</div>
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">LEVEL</div>${fitnessLabel(d.fitnessLevel)}</div>
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">EQUIPMENT</div>${equipmentLabel(d.equipment)}</div>
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">FOCUS</div>${focusLabel(d.focus)}</div>
          <div><div style="color:#6B7280;font-weight:600;font-size:11px;margin-bottom:3px">DURATION</div>${weeks} weeks</div>
        </div>
      </div>
      <div class="reality-box">
        <strong>Timeline:</strong> ${daysLeft} days until your event. Your ${weeks}-week program starts today and runs until approximately ${formatDate(new Date(Date.now() + weeks*7*86400000).toISOString().slice(0,10))}.
      </div>
      <div class="ob-actions" style="margin-top:20px">
        <button class="btn btn-secondary" onclick="obPrev()">&larr; Adjust</button>
        <button class="btn btn-primary" onclick="obFinish()">Start My Plan &rarr;</button>
      </div>`;
  }

  body.innerHTML = html;

  // Wire up event date change for preview
  if (step === 1) {
    const dateInput = document.getElementById('ob-event-date');
    if (dateInput) {
      const showPreview = () => {
        const val = dateInput.value;
        if (!val) return;
        const days = getDaysLeft(val);
        const weeks = days <= 63 ? 8 : days <= 77 ? 10 : 12;
        const preview = document.getElementById('ob-weeks-preview');
        if (preview) {
          preview.style.display = 'block';
          preview.innerHTML = `<strong>${days} days away.</strong> We'll build you a ${weeks}-week transformation plan starting today.`;
        }
      };
      dateInput.addEventListener('change', showPreview);
      if (d.eventDate) showPreview();
    }
  }
}

function obSelect(key, btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.ui.obData[key] = btn.dataset.val;
}

function obSelectUnit(unit) {
  const prevUnit = state.ui.obData.weightUnit || 'lbs';
  if (prevUnit !== unit) {
    const convert = prevUnit === 'lbs' ? lbsToKg : kgToLbs;
    const cw = state.ui.obData.currentWeight;
    const gw = state.ui.obData.goalWeight;
    if (cw && cw > 0) state.ui.obData.currentWeight = convert(cw);
    if (gw && gw > 0) state.ui.obData.goalWeight = convert(gw);
  }
  state.ui.obData.weightUnit = unit;
  renderObStep();
}

function obVal(key, val) {
  state.ui.obData[key] = val;
}

function obNext() {
  const d = state.ui.obData;
  const step = state.ui.obStep;
  if (step === 1) {
    if (!d.eventType) { showToast('Please select your event type.'); return; }
    if (!d.eventDate) { showToast('Please enter your event date.'); return; }
    if (getDaysLeft(d.eventDate) < 21) { showToast('Event must be at least 3 weeks away.'); return; }
  } else if (step === 2) {
    if (!d.fitnessLevel) { showToast('Please select your fitness level.'); return; }
    if (!d.hours) { showToast('Please select your training hours.'); return; }
    if (!d.equipment) { showToast('Please select your equipment access.'); return; }
  } else if (step === 3) {
    if (!d.focus) { showToast('Please select your main focus.'); return; }
  } else if (step === 4) {
    if (!d.why) { showToast('Please share your motivation — it\'ll be on your dashboard.'); return; }
  }
  state.ui.obStep++;
  renderObStep();
}

function obPrev() {
  state.ui.obStep--;
  renderObStep();
}

function obFinish() {
  const d = state.ui.obData;
  const chosenUnit = d.weightUnit || 'lbs';
  let currentWeightLbs = d.currentWeight || null;
  let goalWeightLbs = d.goalWeight || null;
  if (chosenUnit === 'kg') {
    if (currentWeightLbs) currentWeightLbs = Math.round(kgToLbs(currentWeightLbs) * 10) / 10;
    if (goalWeightLbs) goalWeightLbs = Math.round(kgToLbs(goalWeightLbs) * 10) / 10;
  }
  state.user = {
    eventType: d.eventType,
    eventDate: d.eventDate,
    fitnessLevel: d.fitnessLevel,
    hours: d.hours,
    equipment: d.equipment,
    focus: d.focus,
    currentWeight: currentWeightLbs,
    goalWeight: goalWeightLbs,
    why: d.why,
    notice: d.notice || '',
    injuries: d.injuries || '',
    setupDate: today(),
    setupComplete: true,
  };

  state.settings.weightUnit = chosenUnit;
  state.settings.measurementUnit = chosenUnit === 'kg' ? 'cm' : 'in';

  state.plan = generatePlan(state.user);
  saveUser();
  savePlan();
  saveSettings();

  hideOnboarding();
  initMainApp();
  switchTab('dashboard');
  showToast('Your plan is ready! Welcome to VacationReady OS.');
  setTimeout(() => showToast('Tip: export a backup from Settings when you start logging data.'), 3200);
}

function renderProgressRings(s) {
  const R = 50, SW = 10, C = +(2 * Math.PI * R).toFixed(2);

  function ring(pct, color, centerHtml) {
    const p = Math.min(100, Math.max(0, pct ?? 0));
    const offset = +(C - (p / 100) * C).toFixed(1);
    return `
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="${R}"/>
          <circle class="ring-fg" cx="60" cy="60" r="${R}"
            stroke="${color}"
            stroke-dasharray="${C}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-inner">${centerHtml}</div>
      </div>`;
  }

  const planPct      = s.planEffortPct ?? 0;
  const effortPct    = s.workoutStats?.weekEffortPct ?? 0;
  const rs           = s.readinessScore ?? { score: null, label: 'No data' };
  const readPct      = rs.score ?? 0;
  const hasReadiness = rs.score !== null;
  const ws           = s.workoutStats || {};
  const weeksLeft    = Math.max(0, (s.totalWeeks ?? 0) - (s.currentWeek ?? 0));

  const planRing = ring(planPct, '#7C3AED',
    `<div class="ring-pct">${planPct}%</div><div class="ring-sub">of plan</div>`);

  const effortRing = ring(effortPct, '#F59E0B',
    `<div class="ring-pct">${effortPct}%</div><div class="ring-sub">effort</div>`);

  const readCenter = hasReadiness
    ? `<div class="ring-pct">${readPct}%</div><div class="ring-sub">${rs.label}</div>`
    : `<div class="ring-sub" style="font-size:9px;color:#6B7280;line-height:1.3">Log<br>check-in</div>`;
  const readRing = ring(readPct, '#10B981', readCenter);

  return `
    <div class="rings-row section-gap">
      <div class="ring-card ring-card-plan">
        ${planRing}
        <div class="ring-label">Plan Progress</div>
        <div class="ring-micro">${weeksLeft} week${weeksLeft !== 1 ? 's' : ''} left</div>
      </div>
      <div class="ring-card ring-card-effort">
        ${effortRing}
        <div class="ring-label">Weekly Effort</div>
        <div class="ring-micro">${ws.weekLogged ?? 0}/${ws.weekPlanned ?? 0} workouts</div>
      </div>
      <div class="ring-card ring-card-ready">
        ${readRing}
        <div class="ring-label">Readiness</div>
        <div class="ring-micro">${hasReadiness ? rs.label : 'Log a check-in'}</div>
      </div>
    </div>`;
}
